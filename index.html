<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>The Cinder Vault</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Explicit anchor: resists WebView font-boosting (pairs with text-size-adjust) */
      font-size: 16px;

      /* === Solarized Light (Ethan Schoonover) === */
      --bg-dark: #fdf6e3;        /* base3  — main background */
      --bg-panel: #eee8d5;       /* base2  — panels / cards */
      --text-primary: #586e75;   /* base01 — primary text */
      --text-muted: #93a1a1;     /* base1  — muted text */
      --border-color: #b6b193;   /* softened base2/base1 border */
      --color-attack: #dc322f;   /* red */
      --color-skill: #268bd2;    /* blue */
      --color-power: #b58900;    /* yellow */
      --color-block: #2aa198;    /* cyan (block) */
      --color-heal: #859900;     /* green (heal / HP) */
      --color-danger: #dc322f;   /* red */
      --color-gold: #b58900;     /* yellow */
      --color-elite: #cb4b16;    /* orange */
      --color-relic: #6c71c4;    /* violet */
      --letterbox: #93a1a1;      /* stage frame color (neutral) */
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--letterbox);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Courier New', monospace;
      color: var(--text-primary);
      line-height: 1.4;
    }

    /* Fixed 1024x600 design stage, scaled to fit the viewport (see fitStage() in JS) */
    #stage {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1024px;
      height: 600px;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(var(--stage-scale, 1));
      overflow: hidden;
      background: var(--bg-dark);
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-dark);
      color: var(--text-primary);
      user-select: none;
      -webkit-user-select: none;
    }

    /* Persistent sound toggle — lives in #stage (never wiped by render), so it
       is available on every screen including the menu. */
    #mute-btn {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 40px;
      height: 40px;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 4px;
      font-family: inherit;
      font-size: 1.15em;
      line-height: 1;
      cursor: pointer;
      opacity: 0.85;
    }
    #mute-btn:hover { opacity: 1; border-color: var(--text-primary); }
    #mute-btn.muted { color: var(--text-muted); opacity: 0.6; }
    #mute-btn.muted::after {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      top: 50%;
      height: 2px;
      background: var(--color-danger);
      transform: rotate(-24deg);
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* === Menu Screen === */
    .menu-screen {
      justify-content: flex-start;
      align-items: center;
      overflow-y: auto;
    }

    .menu-panel {
      text-align: center;
      border: 2px solid var(--border-color);
      padding: 28px 40px;
      background: var(--bg-panel);
      max-width: 500px;
      /* Auto top/bottom margins center the panel when it fits and keep the top
         reachable (scrollable) when it's taller than the 600px stage. */
      margin: auto 0;
    }

    .menu-title {
      font-size: 2.5em;
      margin-bottom: 20px;
      color: var(--color-danger);
      text-shadow: 0 0 10px rgba(220, 50, 47, 0.25);
    }

    .menu-subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background: var(--bg-dark);
      border: 2px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      font-size: 1.1em;
      transition: all 0.2s;
    }

    .menu-button:hover {
      background: var(--border-color);
      border-color: var(--text-primary);
    }

    /* === Status Bar === */
    .status-bar {
      background: var(--bg-panel);
      border-bottom: 2px solid var(--border-color);
      padding: 8px 56px 8px 16px;   /* extra right pad clears the #mute-btn corner control */
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9em;
    }

    .status-left, .status-right {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .hp-bar {
      display: inline-block;
      width: 80px;
      height: 8px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      position: relative;
      margin-left: 5px;
    }

    .hp-fill {
      height: 100%;
      background: var(--color-heal);
      transition: width 0.2s;
    }

    .relic-chip {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 1px solid var(--color-relic);
      background: rgba(108, 113, 196, 0.12);
      text-align: center;
      line-height: 24px;
      font-size: 0.7em;
      cursor: help;
      border-radius: 2px;
    }

    /* === Map Screen === */
    .map-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px;
    }

    .map-canvas {
      position: relative;
      margin: 0 auto;
    }

    .map-edges {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .map-edge {
      stroke: var(--border-color);
      stroke-width: 2;
    }

    .map-edge.reachable {
      stroke: var(--text-muted);
      stroke-width: 2.5;
      stroke-dasharray: 5 4;
      animation: edge-flow 1.2s linear infinite;
    }

    @keyframes edge-flow {
      to { stroke-dashoffset: -18; }
    }

    .map-node {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: default;
      width: 74px;
      height: 74px;
      border: 2px solid var(--border-color);
      background: var(--bg-panel);
      text-align: center;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
    }

    .map-node.available {
      border-color: var(--text-primary);
      cursor: pointer;
      box-shadow: 0 0 12px rgba(88, 110, 117, 0.35);
    }

    .map-node.available:hover {
      background: var(--border-color);
      transform: translate(-50%, -50%) scale(1.1);
    }

    .map-node.current {
      border-color: var(--color-gold);
      box-shadow: 0 0 14px rgba(181, 137, 0, 0.45);
    }

    .map-node.visited {
      opacity: 0.45;
    }

    .map-node.locked {
      opacity: 0.28;
    }

    .map-node.elite-node { border-color: var(--color-elite); }
    .map-node.boss-node { border-color: var(--color-danger); width: 88px; height: 88px; }
    .map-node.boss-node .map-node-icon { font-size: 2.2em; }

    .map-node-icon {
      font-size: 1.7em;
      line-height: 1;
    }

    .map-node-type {
      font-size: 0.6em;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    .map-floor-label {
      position: absolute;
      left: 6px;
      transform: translateY(-50%);
      font-size: 0.7em;
      color: var(--text-muted);
      z-index: 1;
    }

    /* === Combat Screen === */
    .combat-screen {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .combat-enemies {
      flex: 1;
      display: flex;
      gap: 15px;
      padding: 12px;
      border-bottom: 2px solid var(--border-color);
      overflow-y: auto;
    }

    .enemy-panel {
      flex: 1;
      min-width: 120px;
      border: 2px solid var(--border-color);
      background: var(--bg-panel);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .enemy-panel.targetable {
      border-color: var(--color-danger);
      cursor: pointer;
      background: rgba(220, 50, 47, 0.12);
    }

    .enemy-name {
      font-weight: bold;
      text-align: center;
      word-break: break-word;
    }

    .enemy-intent {
      text-align: center;
      font-size: 1.2em;
      color: var(--color-danger);
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .hp-display {
      display: flex;
      justify-content: space-between;
      font-size: 0.8em;
      margin-bottom: 5px;
    }

    .hp-bar-long {
      width: 100%;
      height: 12px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      margin-bottom: 8px;
      position: relative;
    }

    .hp-fill-long {
      height: 100%;
      background: var(--color-heal);
      transition: width 0.2s;
    }

    .block-display {
      text-align: center;
      color: var(--color-block);
      font-weight: bold;
    }

    .statuses {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      font-size: 0.7em;
      text-align: center;
      cursor: help;
      border-radius: 2px;
    }

    .player-section {
      display: flex;
      gap: 20px;
      padding: 15px 20px;
      border-bottom: 2px solid var(--border-color);
      background: var(--bg-panel);
      align-items: center;
    }

    .player-panel {
      border: 2px solid var(--border-color);
      padding: 15px;
      background: var(--bg-dark);
      min-width: 150px;
    }

    .energy-display {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin: 10px 0;
    }

    .energy-orb {
      width: 20px;
      height: 20px;
      border: 1px solid var(--color-gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6em;
    }

    .energy-orb.full {
      background: var(--color-gold);
      color: var(--bg-dark);
    }

    .energy-orb.empty {
      background: transparent;
    }

    .potion-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 10px;
    }

    .potion-slot {
      width: 44px;
      height: 44px;
      border: 1px solid var(--color-relic);
      background: rgba(108, 113, 196, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.9em;
      border-radius: 3px;
      transition: all 0.2s;
    }

    .potion-slot:hover {
      background: rgba(108, 113, 196, 0.32);
    }

    .potion-slot.empty {
      border-color: var(--border-color);
      background: transparent;
      color: var(--text-muted);
      cursor: default;
    }

    .hand-section {
      flex: 1;
      min-width: 0;               /* allow shrink below card-row content width so the hand scrolls */
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .combat-hand {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    .card {
      flex-shrink: 0;
      width: 92px;
      border: 2px solid var(--border-color);
      background: var(--bg-dark);
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 0.75em;
    }

    .card:hover {
      transform: scale(1.05);
      border-color: var(--text-primary);
    }

    .card.unaffordable {
      opacity: 0.45;
    }

    .card.unaffordable .card-cost {
      color: var(--color-danger);
      border-color: var(--color-danger);
    }

    .card-cost {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 22px;
      height: 22px;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.85em;
    }

    .card-name {
      font-weight: bold;
      text-align: center;
      margin-top: 15px;
      word-break: break-word;
    }

    .card-type {
      text-align: center;
      font-size: 0.7em;
      color: var(--text-muted);
    }

    .card-desc {
      font-size: 0.7em;
      text-align: center;
      color: var(--text-muted);
      line-height: 1.2;
    }

    .card.attack {
      border-left: 3px solid var(--color-attack);
    }

    .card.skill {
      border-left: 3px solid var(--color-skill);
    }

    .card.power {
      border-left: 3px solid var(--color-power);
    }

    .combat-log {
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      padding: 8px;
      height: 44px;
      overflow-y: auto;
      font-size: 0.75em;
      color: var(--text-muted);
    }

    .combat-log-entry {
      margin: 2px 0;
      line-height: 1.2;
    }

    .combat-controls {
      display: flex;
      gap: 10px;
      padding: 8px 16px;
    }

    .end-turn-btn {
      flex: 1;
      min-height: 44px;
      padding: 10px;
      background: var(--color-skill);
      border: 2px solid var(--color-skill);
      color: var(--bg-dark);
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      font-size: 1em;
      transition: all 0.2s;
    }

    .end-turn-btn:hover {
      background: rgba(38, 139, 210, 0.8);
    }

    .end-turn-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* === Rest/Shop/Event/Reward Screens === */
    .center-panel-screen {
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .center-panel {
      border: 2px solid var(--border-color);
      background: var(--bg-panel);
      padding: 30px;
      max-width: 600px;
      max-height: 540px;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: var(--text-primary);
      text-align: center;
    }

    .panel-content {
      margin-bottom: 20px;
    }

    .panel-text {
      line-height: 1.6;
      margin-bottom: 15px;
      color: var(--text-muted);
    }

    .choice-button {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background: var(--bg-dark);
      border: 2px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95em;
      text-align: left;
      transition: all 0.2s;
    }

    .choice-button:hover {
      background: var(--border-color);
      border-color: var(--text-primary);
    }

    .choice-label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .choice-desc {
      display: block;
      font-size: 0.85em;
      color: var(--text-muted);
    }

    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
      margin: 15px 0;
    }

    .shop-item {
      border: 2px solid var(--border-color);
      background: var(--bg-dark);
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .shop-item:hover {
      border-color: var(--text-primary);
    }

    .shop-item-price {
      color: var(--color-gold);
      font-weight: bold;
      font-size: 0.9em;
    }

    .leave-button, .skip-button, .new-run-button {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: var(--bg-dark);
      border: 2px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95em;
      transition: all 0.2s;
    }

    .leave-button:hover, .skip-button:hover, .new-run-button:hover {
      background: var(--border-color);
      border-color: var(--text-primary);
    }

    /* === Victory/GameOver Screens === */
    .victory-screen {
      justify-content: center;
      align-items: center;
    }

    .victory-panel {
      text-align: center;
      border: 2px solid var(--color-heal);
      padding: 40px;
      background: var(--bg-panel);
      max-width: 500px;
    }

    .victory-title {
      font-size: 2em;
      color: var(--color-heal);
      margin-bottom: 20px;
    }

    .gameover-panel {
      text-align: center;
      border: 2px solid var(--color-danger);
      padding: 40px;
      background: var(--bg-panel);
      max-width: 500px;
    }

    .gameover-title {
      font-size: 2em;
      color: var(--color-danger);
      margin-bottom: 20px;
    }

    .stats-box {
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      padding: 15px;
      margin: 15px 0;
      text-align: left;
    }

    .stat-line {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
      font-size: 0.95em;
    }

    /* Floating combat numbers (fire-and-forget overlay) */
    .floating-number {
      position: fixed;
      transform: translate(-50%, -50%);
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 1.4em;
      pointer-events: none;
      z-index: 1000;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
      animation: float-up 0.9s ease-out forwards;
    }

    .floating-number.floating-dmg { color: var(--color-danger); }
    .floating-number.floating-block { color: var(--color-block); }

    @keyframes float-up {
      0% { opacity: 0; transform: translate(-50%, -30%) scale(0.8); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      100% { opacity: 0; transform: translate(-50%, -120%) scale(1); }
    }

    .disabled-choice, .disabled-choice:hover {
      opacity: 0.45;
      cursor: default;
      background: var(--bg-dark);
      border-color: var(--border-color);
    }

    .inline-chip-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 12px;
      margin: 2px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8em;
      border-radius: 3px;
    }

    .inline-chip-button:hover {
      border-color: var(--text-primary);
      background: var(--border-color);
    }

    .debug-panel {
      margin-top: 15px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 0.78em;
      text-align: left;
    }

    .reward-summary {
      border: 1px solid var(--border-color);
      background: var(--bg-dark);
      padding: 12px;
      margin: 12px 0;
      color: var(--text-muted);
    }

    .deck-stats {
      border: 1px solid var(--border-color);
      background: var(--bg-dark);
      padding: 10px;
      margin-bottom: 12px;
      color: var(--text-muted);
      font-size: 0.85em;
      line-height: 1.5;
    }

    .active-power-chip {
      display: inline-block;
      border: 1px solid var(--color-power);
      color: var(--color-power);
      padding: 2px 5px;
      margin: 2px;
      font-size: 0.75em;
      border-radius: 3px;
    }

    /* The fixed 1024x600 stage (see #stage) scales as one unit, so the old
       max-width:760px responsive tier is obsolete. Instead, guard orientation:
       the game is landscape-only, so prompt to rotate in portrait. */
    @media (orientation: portrait) {
      #stage { display: none; }
      body::after {
        content: "Rotate your device to landscape";
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
        font-family: 'Courier New', monospace;
        font-size: 1.2em;
        color: var(--text-primary);
        background: var(--bg-dark);
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* ===== ICONS (game-icons.net) ===== */
    .icon {
      width: 1em; height: 1em;
      display: inline-block;
      vertical-align: -0.15em;
      fill: currentColor;
      pointer-events: none;   /* clicks fall through to the data-action parent */
      flex-shrink: 0;
    }
    .map-node-icon .icon { width: 34px; height: 34px; }
    .map-node.boss-node .map-node-icon .icon { width: 44px; height: 44px; }
    .enemy-intent .icon { width: 18px; height: 18px; }
    .status-chip { gap: 1px; }
    .status-chip .icon { width: 15px; height: 15px; }
    .status-chip .chip-count { font-size: 0.85em; font-weight: bold; }
    .relic-chip .icon { width: 17px; height: 17px; vertical-align: -0.2em; color: var(--color-relic); }
    .potion-slot .icon { width: 17px; height: 17px; }
    .energy-orb .icon { width: 12px; height: 12px; }
    .status-item .icon { width: 14px; height: 14px; margin-right: 3px; }
    .status-item.stat-hp .icon { color: var(--color-heal); }
    .status-item.stat-gold .icon { color: var(--color-gold); }
    .status-item.stat-floor .icon { color: var(--text-muted); }
    .card-type .icon { width: 13px; height: 13px; vertical-align: -0.1em; }
    .card-art { text-align: center; margin: 2px 0; color: var(--text-muted); }
    .card-art .icon { width: 30px; height: 30px; }
    .card.attack .card-art .icon { color: var(--color-attack); }
    .card.skill .card-art .icon { color: var(--color-skill); }
    .card.power .card-art .icon { color: var(--color-power); }
    .card.curse .card-art .icon { color: var(--color-relic); }
    .icon-title { width: 24px; height: 24px; margin: 0 8px; vertical-align: -0.15em; }
    .icon-block { color: var(--color-block); }
    .block-display .icon { width: 15px; height: 15px; }
    .shop-item-icon { text-align: center; margin-bottom: 4px; color: var(--text-muted); }
    .shop-item-icon .icon { width: 30px; height: 30px; }
    .choice-label .icon { width: 16px; height: 16px; vertical-align: -0.2em; margin-right: 2px; }
    .choice-desc .icon { width: 13px; height: 13px; vertical-align: -0.1em; }
    .reward-summary .icon { width: 14px; height: 14px; vertical-align: -0.15em; }
    .inline-chip-button .icon { width: 12px; height: 12px; vertical-align: -0.1em; }
    /* Curated colored pixel-art icons (relics/potions). Inherit per-context .icon sizing above;
       render crisply (no smoothing) and keep their own colors (no currentColor tint). */
    img.icon-img { image-rendering: pixelated; image-rendering: crisp-edges; object-fit: contain; fill: none; }
    .relic-chip img.icon-img { color: initial; }
    /* Transient combat effect sprites (pixel-art), layered above everything, click-through. */
    #fx-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
    .fx-sprite { position: fixed; image-rendering: pixelated; pointer-events: none; will-change: transform, opacity; }
  </style>
</head>
