        deck: ['jab','jab','slash','shield-bash','guard','quickstep','scout','scout','adrenaline','battle-trance'],
        blurb: 'Extra draw, cheap cards, and potion-friendly tempo.'
      }
    };

    // ============ 3. STATE ============

    let STATE = null;

    function createNewRun(characterId) {
      const character = CHARACTERS_DB[characterId] || CHARACTERS_DB['cinder-knight'];
      return {
        characterId: character.id,
        characterName: character.name,
        deck: character.deck.map(defId => ({ uid: uid(), defId, upgraded: false })),
        maxHp: character.maxHp,
        hp: character.maxHp,
        gold: character.gold != null ? character.gold : LAYOUT.STARTING_GOLD,
        relics: [...character.relics],
        potions: [null, null, null],
        floor: 1,
        map: null,
        currentNodeId: null,
        seenEventIds: [],
        removalsThisRun: 0
      };
    }

    // ============ 4. UTILS ============

    // Seedable PRNG (mulberry32). All game randomness routes through rand()
    // so runs can be reproduced from a seed.
    let _rngState = (Math.random() * 4294967296) >>> 0;

    function seedRng(seed) {
      _rngState = (seed >>> 0) || 1;
    }

    function rand() {
      _rngState |= 0;
      _rngState = (_rngState + 0x6D2B79F5) | 0;
      let t = Math.imul(_rngState ^ (_rngState >>> 15), 1 | _rngState);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }

    function randInt(min, max) {
      // inclusive min, exclusive max
      return min + Math.floor(rand() * (max - min));
    }

    function pickOne(arr) {
      return arr[Math.floor(rand() * arr.length)];
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function weightedPick(weights) {
      const sum = Object.values(weights).reduce((a, b) => a + b, 0);
      let roll = rand() * sum;
      for (const [key, weight] of Object.entries(weights)) {
        roll -= weight;
        if (roll <= 0) return key;
      }
      return Object.keys(weights)[0];
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function uid() {
      return Math.random().toString(36).substring(2, 11);
    }

    function statusLabel(statusName) {
      return (STATUS_INFO[statusName] && STATUS_INFO[statusName].label) || statusName;
    }

    function statusShort(statusName) {
      return (STATUS_INFO[statusName] && STATUS_INFO[statusName].short) || statusName.slice(0, 3);
    }

    function statusTitle(statusName, value) {
      const info = STATUS_INFO[statusName];
      return `${statusLabel(statusName)}: ${value}${info ? ' — ' + info.desc : ''}`;
    }

    function healRun(game, amount, source) {
      if (!game || !game.run) return 0;
      const before = game.run.hp;
      game.run.hp = Math.min(game.run.maxHp, game.run.hp + amount);
      const healed = game.run.hp - before;
      if (healed > 0 && game.combat && game.combat.log) game.combat.log.push(`${source || 'Healing'} restores ${healed} HP.`);
      return healed;
    }

    function gainMaxHp(game, amount, alsoHeal) {
      if (!game || !game.run || amount <= 0) return 0;
      game.run.maxHp += amount;
      if (alsoHeal) game.run.hp = Math.min(game.run.maxHp, game.run.hp + amount);
      if (game.combat && game.combat.log) game.combat.log.push(`Max HP increased by ${amount}.`);
      return amount;
    }

    function grantRandomCard(game, rarity) {
      const pool = Object.values(CARDS_DB).filter(c => c.rarity === rarity && c.rarity !== CARD_RARITIES.BASIC && c.type !== CARD_TYPES.CURSE);
      if (!pool.length) return null;
      const card = pickOne(pool);
      game.run.deck.push({ uid: uid(), defId: card.id, upgraded: false });
      return card.id;
    }

    function isCurseCardInstance(card) {
      const def = card && CARDS_DB[card.defId];
      return !!def && def.type === CARD_TYPES.CURSE;
    }

    function upgradeRandomCard(game) {
      const pool = game.run.deck.filter(c => !c.upgraded && !isCurseCardInstance(c));
      if (!pool.length) return null;
      const card = pickOne(pool);
      card.upgraded = true;
      return card.uid;
    }

    // --- Persistence / meta-stats ---
    const SAVE_KEY = 'cinderVaultSave';
    const META_KEY = 'cinderVaultMeta';

    function clearSave() {
      try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
    }

    function defaultMeta() {
      return { wins: 0, losses: 0, bestFloor: 0, bestGold: 0, highestAscensionUnlocked: 0, runs: [] };
    }

    function loadMeta() {
      try { return { ...defaultMeta(), ...(JSON.parse(localStorage.getItem(META_KEY)) || {}) }; }
      catch (e) { return defaultMeta(); }
    }

    function saveMeta(meta) {
      try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {}
    }

    function hasSave() {
      try { return !!localStorage.getItem(SAVE_KEY); } catch (e) { return false; }
    }

    function saveGame(game) {
      if (!game || !game.run || game.screen === SCREENS.MENU || game.screen === SCREENS.VICTORY || game.screen === SCREENS.GAMEOVER) return;
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ version: 2, rngState: _rngState, savedAt: Date.now(), state: game }));
      } catch (e) {}
    }

    function rehydrateState(game) {
      if (!game) return game;
      game.ui = game.ui || {};
      game.act = game.act || 1;
      if (game.combat && game.combat.enemies) {
        for (const enemy of game.combat.enemies) enemy.template = ENEMIES_DB[enemy.defId];
      }
      if (game.ui.eventDef && game.ui.eventDef.id) {
        game.ui.eventDef = EVENTS_DB.find(e => e.id === game.ui.eventDef.id) || game.ui.eventDef;
      }
      if (game.ui.cardRewardChoices) {
        game.ui.cardRewardChoices = game.ui.cardRewardChoices.map(c => CARDS_DB[c.id] || c).filter(Boolean);
      }
      return game;
    }

    function loadGame() {
      try {
        const saved = JSON.parse(localStorage.getItem(SAVE_KEY));
        if (!saved || !saved.state || saved.version !== 2) return false;
        STATE = rehydrateState(saved.state);
        _rngState = saved.rngState || STATE.seed || 1;
        render();
        return true;
      } catch (e) { return false; }
    }

    function recordRunResult(game, won) {
      try {
        const meta = loadMeta();
        if (won) meta.wins++; else meta.losses++;
        meta.bestFloor = Math.max(meta.bestFloor || 0, game.run.floor || 0);
        meta.bestGold = Math.max(meta.bestGold || 0, game.run.gold || 0);
        if (won) meta.highestAscensionUnlocked = Math.min(5, Math.max(meta.highestAscensionUnlocked || 0, (game.ascension || 0) + 1));
        meta.runs = meta.runs || [];
        meta.runs.unshift({
          won,
          date: new Date().toISOString(),
          character: game.run.characterName || 'Cinder Knight',
          boss: game.run.bossName || 'Unknown',
          floor: game.run.floor || 0,
          gold: game.run.gold || 0,
          deckSize: game.run.deck ? game.run.deck.length : 0,
          relics: game.run.relics ? game.run.relics.length : 0,
          ascension: game.ascension || 0,
          act: game.act || 1,
          seed: game.seed
        });
        meta.runs = meta.runs.slice(0, 10);
        saveMeta(meta);
      } catch (e) {}
      clearSave();
    }

    // --- Fire-and-forget floating combat numbers (Phase 1.7) ---
    // Appends a transient element over the target's panel, outside the
    // full-rerender cycle, and removes itself when the animation ends.
    function spawnFloatingNumber(targetKey, text, kind) {
      // Audio cue: block gains vs damage impacts.
      AudioEngine.sfx(kind === 'block' ? 'block' : 'hit');
      // Deferred so it runs after render() repaints the DOM for this action.
      setTimeout(() => {
        const sel = targetKey === 'player'
          ? '.player-panel'
          : `.enemy-panel[data-enemyuid="${targetKey}"]`;
        let anchor = document.querySelector(sel);
        if (!anchor && targetKey !== 'player') anchor = document.querySelector('.combat-enemies');
        if (!anchor) return;
        const rect = anchor.getBoundingClientRect();
        const el = document.createElement('div');
        el.className = 'floating-number ' + (kind === 'block' ? 'floating-block' : 'floating-dmg');
        el.textContent = text;
        el.style.left = (rect.left + rect.width / 2) + 'px';
        el.style.top = (rect.top + rect.height / 3) + 'px';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
        setTimeout(() => el.remove(), 1200);
      }, 0);
    }

    // --- Fire-and-forget pixel-art combat effect sprites ---
    // Cycles a folder of numbered frames (assets/art/fx/<name>/<i>.png) over the
    // target's panel. Mirrors spawnFloatingNumber: deferred past render(), lives in
    // #fx-layer (outside #app so it survives re-render), self-removes when done.
    const FX_DEFS = {
      attack: { frames: 8, size: 108, dur: 45 },  // fiery burst when an enemy is hit
      block:  { frames: 7, size: 88, dur: 55 },   // shield orb when the player gains block
      potion: { frames: 7, size: 96, dur: 55 },   // magical burst when a potion is quaffed
    };
    function playEffect(targetKey, name) {
      const def = FX_DEFS[name];
      if (!def) return;
      setTimeout(() => {
        const sel = targetKey === 'player'
          ? '.player-panel'
          : `.enemy-panel[data-enemyuid="${targetKey}"]`;
        let anchor = document.querySelector(sel);
        if (!anchor && targetKey !== 'player') anchor = document.querySelector('.combat-enemies');
        if (!anchor) return;
        const rect = anchor.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        // Anchor to the upper third, aligning with where floating damage/block numbers pop.
        const cy = rect.top + rect.height / 3;
        let layer = document.getElementById('fx-layer');
        if (!layer) { layer = document.createElement('div'); layer.id = 'fx-layer'; document.body.appendChild(layer); }
        const img = document.createElement('img');
        img.className = 'fx-sprite';
        img.alt = '';
        img.style.width = def.size + 'px';
        img.style.height = def.size + 'px';
        img.style.left = (cx - def.size / 2) + 'px';
        img.style.top = (cy - def.size / 2) + 'px';
        img.src = 'assets/art/fx/' + name + '/0.png';
        layer.appendChild(img);
        let i = 0;
        const timer = setInterval(() => {
          i++;
          if (i >= def.frames) { clearInterval(timer); img.remove(); return; }
          img.src = 'assets/art/fx/' + name + '/' + i + '.png';
        }, def.dur);
        // Safety net in case the interval is throttled (background tab, etc.).
        setTimeout(() => { clearInterval(timer); img.remove(); }, def.dur * (def.frames + 2) + 300);
      }, 0);
    }

    // ============ 5. MAP GENERATION ============

    function generateMap() {
      const nodes = [];
      const nodeIds = {};

      const nodeCaps = { ELITE: 5, SHOP: 3, TREASURE: 3, REST: 6 };
      let nodeCounts = { ELITE: 0, SHOP: 0, TREASURE: 0, REST: 0 };

      for (let floor = 1; floor <= LAYOUT.FLOORS; floor++) {
        const numNodesOnFloor = floor === LAYOUT.FLOORS ? 1 : (floor === 1 ? 3 : Math.floor(3 + rand() * 3));

        // Spread nodes across distinct lanes so they don't overlap on screen.
        const lanes = [];
        for (let c = 0; c < LAYOUT.COLS; c++) lanes.push(c);
        const chosenLanes = shuffle(lanes).slice(0, numNodesOnFloor).sort((a, b) => a - b);

        for (let nodeNum = 0; nodeNum < numNodesOnFloor; nodeNum++) {
          let col;
          if (floor === LAYOUT.FLOORS) {
            col = Math.floor(LAYOUT.COLS / 2); // boss centered
          } else {
            col = chosenLanes[nodeNum];
          }
          const nodeId = `node_${floor}_${nodeNum}`;
          nodeIds[nodeId] = { floor, col };

          let nodeType;
          if (floor === 1) {
            nodeType = NODE_TYPES.COMBAT;
          } else if (floor === LAYOUT.FLOORS) {
            nodeType = NODE_TYPES.BOSS;
          } else if (floor === LAYOUT.FLOORS - 1) {
            nodeType = NODE_TYPES.REST;
          } else {
            const weights = {
              [NODE_TYPES.COMBAT]: 0.45,
              [NODE_TYPES.EVENT]: 0.20,
              [NODE_TYPES.ELITE]: floor >= 3 && nodeCounts.ELITE < nodeCaps.ELITE ? ((STATE && STATE.ascension >= 2) ? 0.15 : 0.10) : 0,
              [NODE_TYPES.REST]: nodeCounts.REST < nodeCaps.REST ? 0.12 : 0,
              [NODE_TYPES.SHOP]: nodeCounts.SHOP < nodeCaps.SHOP ? 0.08 : 0,
              [NODE_TYPES.TREASURE]: nodeCounts.TREASURE < nodeCaps.TREASURE ? 0.05 : 0
            };

            nodeType = weightedPick(Object.fromEntries(Object.entries(weights).filter(([k, v]) => v > 0)));
          }

          if (nodeType in nodeCounts) nodeCounts[nodeType]++;

          nodes.push({ id: nodeId, floor, col, type: nodeType, connections: [], visited: false });
        }
      }

      // Connect nodes
      for (let floor = 1; floor < LAYOUT.FLOORS; floor++) {
        const currentFloor = nodes.filter(n => n.floor === floor);
        const nextFloor = nodes.filter(n => n.floor === floor + 1);

        for (const node of currentFloor) {
          const targetsInRange = nextFloor.filter(n => Math.abs(n.col - node.col) <= 1);
          if (targetsInRange.length > 0) {
            const numConnections = rand() < 0.25 ? 2 : 1;
            const targets = targetsInRange.slice(0, numConnections);
            for (const target of targets) {
              if (!node.connections.includes(target.id)) node.connections.push(target.id);
            }
          }
        }
      }

      // Repair pass: ensure all nodes have paths
      for (let floor = 1; floor < LAYOUT.FLOORS; floor++) {
        const currentFloor = nodes.filter(n => n.floor === floor);
        const nextFloor = nodes.filter(n => n.floor === floor + 1);

        for (const node of currentFloor) {
          if (node.connections.length === 0 && nextFloor.length > 0) {
            const closest = nextFloor.reduce((a, b) => Math.abs(a.col - node.col) < Math.abs(b.col - node.col) ? a : b);
            node.connections.push(closest.id);
          }
        }

        for (const node of nextFloor) {
          const hasPredecessor = currentFloor.some(n => n.connections.includes(node.id));
          if (!hasPredecessor && currentFloor.length > 0) {
            const closest = currentFloor.reduce((a, b) => Math.abs(a.col - node.col) < Math.abs(b.col - node.col) ? a : b);
            if (!closest.connections.includes(node.id)) closest.connections.push(node.id);
          }
        }
      }

      // Floor 15 -> Boss
      for (const node of nodes.filter(n => n.floor === LAYOUT.FLOORS - 1)) {
        const bossNode = nodes.find(n => n.floor === LAYOUT.FLOORS);
        if (!node.connections.includes(bossNode.id)) node.connections.push(bossNode.id);
      }

      return { nodes, edges: [] };
    }

    function availableNodeIds(game) {
      if (!game.run.currentNodeId) {
        return game.run.map.nodes.filter(n => n.floor === 1).map(n => n.id);
      }
      const current = game.run.map.nodes.find(n => n.id === game.run.currentNodeId);
      return current ? current.connections : [];
    }

    function travelToNode(game, nodeId) {
      const node = game.run.map.nodes.find(n => n.id === nodeId);
      if (!node) return;

      game.run.currentNodeId = nodeId;
      node.visited = true;
      game.run.floor = node.floor;

      switch (node.type) {
        case NODE_TYPES.COMBAT:
          startCombat(game, selectEncounter(game, false));
          goTo(SCREENS.COMBAT);
          break;
        case NODE_TYPES.ELITE:
          startCombat(game, selectEncounter(game, true));
          goTo(SCREENS.COMBAT);
          break;
        case NODE_TYPES.BOSS:
          startCombat(game, selectEncounter(game, 'boss'));
          goTo(SCREENS.COMBAT);
          break;
        case NODE_TYPES.REST:
          goTo(SCREENS.REST);
          break;
        case NODE_TYPES.SHOP:
          goTo(SCREENS.SHOP);
          break;
        case NODE_TYPES.EVENT:
          goTo(SCREENS.EVENT);
          break;
        case NODE_TYPES.TREASURE:
          goTo(SCREENS.TREASURE);
          break;
      }
    }

    // Encounter tables. Each entry is a list of enemy ids that fight together.
    // Bands scale with floor so late floors are meaningfully harder.
    const ENCOUNTER_TABLES = {
      early: [ // floors 1-5
        ['ooze-crawler'], ['wraith', 'wraith'], ['molten-egg'], ['ashhound'],
        ['cultist'], ['ooze-crawler', 'molten-egg']
      ],
      mid: [ // floors 6-10
        ['shade'], ['harpy'], ['phantom', 'phantom'], ['guardian'], ['crypt-mender', 'ashhound'],
        ['basilisk'], ['wraith', 'wraith', 'ashhound'], ['cultist', 'molten-egg']
      ],
      late: [ // floors 11-15
        ['golem'], ['gravemaw'], ['revenant'], ['harpy', 'harpy'], ['grave-summoner'],
        ['gravemaw', 'ashhound'], ['revenant', 'phantom'], ['golem', 'molten-egg'], ['grave-summoner', 'crypt-mender']
      ]
    };

    const ELITE_TABLES = {
      early: [['chanter'], ['warden']],
      mid: [['warden'], ['pyromancer'], ['chanter']],
      late: [['pyromancer'], ['leviathan'], ['warden']]
    };

    function encounterBand(floor) {
      if (floor <= 5) return 'early';
      if (floor <= 10) return 'mid';
      return 'late';
    }

    function selectEncounter(game, type) {
      if (type === 'boss') {
        return { enemies: [game.run.bossId || 'bonelord'] };
      }
      if (type === true) {
        const band = encounterBand(game.run.floor);
        return { enemies: pickOne(ELITE_TABLES[band]).slice() };
      }
      const band = encounterBand(game.run.floor);
      return { enemies: pickOne(ENCOUNTER_TABLES[band]).slice() };
    }

    // ============ 6. RELIC HELPERS ============

    function hasRelic(game, relicId) {
      return game.run.relics && game.run.relics.includes(relicId);
    }

    function grantRelic(game, relicId) {
      if (!game.run.relics.includes(relicId)) {
        game.run.relics.push(relicId);
      }
    }

    function getRandomRelic(game, exclude) {
      exclude = exclude || [];
      const owned = game.run.relics || [];
      const pool = Object.keys(RELICS_DB).filter(rid => !owned.includes(rid) && !exclude.includes(rid));
      return pool.length > 0 ? pickOne(pool) : null;
    }

    function relicScratch(game, relicId) {
      if (!game.combat._relic) game.combat._relic = {};
      if (!game.combat._relic[relicId]) game.combat._relic[relicId] = {};
      return game.combat._relic[relicId];
    }

    // Fire a named void hook across every owned relic.
    function fireRelicHook(game, hookName, ...args) {
      if (!game.combat) return;
      for (const rid of game.run.relics) {
        const def = RELICS_DB[rid];
        if (def && typeof def[hookName] === 'function') {
          def[hookName](game, ...args);
        }
      }
    }

    // Fold a value through every owning relic's transform hook.
    function applyRelicModifier(game, hookName, value, ...args) {
      if (!game.combat) return value;
      for (const rid of game.run.relics) {
        const def = RELICS_DB[rid];
        if (def && typeof def[hookName] === 'function') {
          value = def[hookName](game, value, ...args);
        }
      }
      return value;
    }

    function anyRelic(game, pred) {
      return game.run.relics.some(rid => RELICS_DB[rid] && pred(RELICS_DB[rid]));
    }

    function fireNonCombatRelicHook(game, hookName, ...args) {
      if (!game || !game.run || !game.run.relics) return;
      for (const rid of game.run.relics) {
        const def = RELICS_DB[rid];
        if (def && typeof def[hookName] === 'function') def[hookName](game, ...args);
      }
    }

    // ============ 7. COMBAT ENGINE ============

    function startCombat(game, encounterDef) {
      const enemies = encounterDef.enemies.map(enemyDefId => {
        const template = ENEMIES_DB[enemyDefId];
        let hpScale = 1 + Math.max(0, game.run.floor - 1) * 0.035;
        if (game.ascension >= 1) hpScale += 0.10;
        hpScale += Math.max(0, (game.act || 1) - 1) * 0.20;
        if (template.isBoss && game.ascension >= 4) hpScale += 0.25;
        const scaledMaxHp = Math.max(1, Math.round(template.maxHp * hpScale));
        return {
          uid: uid(),
          defId: enemyDefId,
          name: template.name,
          hp: scaledMaxHp,
          maxHp: scaledMaxHp,
          block: 0,
          statuses: {},
          intent: null,
          alive: true,
          intentIndex: 0,
          template
        };
      });

      game.combat = {
        enemies,
        player: { block: 0, statuses: {} },
        energy: LAYOUT.ENERGY_MAX,
        energyMax: LAYOUT.ENERGY_MAX,
        drawPile: shuffle(game.run.deck.map(c => ({ ...c }))),
        hand: [],
        discardPile: [],
        exhaustPile: [],
        activePowers: [],
        turnNum: 1,
        phase: 'PLAYER',
        pendingCardUid: null,
        pendingPotionSlot: null,
        _relic: {},
        log: ['Combat started!']
      };

      for (const enemy of game.combat.enemies) {
        chooseIntent(game, enemy);
      }

      // Combat-start relic hooks.
      fireRelicHook(game, 'onCombatStart');

      startPlayerTurn(game);
    }

    function startPlayerTurn(game) {
      // Clear block at start of turn unless a relic preserves it.
      if (!anyRelic(game, r => r.preservesBlock)) game.combat.player.block = 0;

      // Per-turn relic hooks (reset flags, prime draws, etc.).
      game.combat._extraDraw = 0;
      fireRelicHook(game, 'onTurnStart');

      // Apply start-of-turn statuses (blight/mending).
      tickStatusesStartOfTurn(game, game.combat.player);
      if (game.run.hp <= 0) { checkCombatEnd(game); return; }

      // Refill energy.
      game.combat.energy = game.combat.energyMax;

      // Draw cards (base 5 + any relic-granted extra).
      drawCards(game, 5 + (game.combat._extraDraw || 0));

      game.combat.phase = 'PLAYER';
      game.combat.pendingCardUid = null;
      game.combat.pendingPotionSlot = null;
    }

    function drawCards(game, n) {
      let drew = 0;
      for (let i = 0; i < n; i++) {
        if (game.combat.drawPile.length === 0) {
          game.combat.drawPile = shuffle(game.combat.discardPile);
          game.combat.discardPile = [];
          if (game.combat.drawPile.length === 0) break;
        }

        if (game.combat.hand.length < LAYOUT.HAND_SIZE) {
          game.combat.hand.push(game.combat.drawPile.shift());
          drew++;
        } else {
          game.combat.drawPile.shift();
        }
      }
      if (drew > 0) AudioEngine.sfx('draw');
    }

    function playCard(game, cardUid, targetUid) {
      const cardIdx = game.combat.hand.findIndex(c => c.uid === cardUid);
      if (cardIdx === -1) return;

      const card = game.combat.hand[cardIdx];
      const cardDef = CARDS_DB[card.defId];

      if (game.combat.pendingCardUid === cardUid && !targetUid) {
        game.combat.pendingCardUid = null;
        return;
      }

      // Unplayable cards (curses) can't be played.
      if (cardDef.unplayable) return;

      // Validate energy
      if (game.combat.energy < cardDef.cost) return;

      // Handle targeting
      if (cardDef.target === 'ENEMY_SINGLE' && !targetUid) {
        const aliveEnemies = game.combat.enemies.filter(e => e.alive);
        if (aliveEnemies.length > 1) {
          game.combat.pendingCardUid = cardUid;
          return;
        }
        if (aliveEnemies.length === 1) {
          targetUid = aliveEnemies[0].uid;
        }
      }

      // Get target
      let target = null;
      if (cardDef.target === 'ENEMY_SINGLE') {
        target = game.combat.enemies.find(e => e.uid === targetUid && e.alive);
        if (!target) return;
      }

      // Relic: Pen Nib primes an upgraded card. Temporarily treat this play as upgraded.
      const originallyUpgraded = card.upgraded;
      if (game.combat._penNibPrimed) {
        card.upgraded = true;
        game.combat._penNibPrimed = false;
      }

      // Apply effects
      if (cardDef.custom) {
        cardDef.custom(game, target, card);
      } else if (cardDef.effects) {
        applyEffects(game, card, cardDef, target);
      }

      card.upgraded = originallyUpgraded;

      // Relic hooks reacting to a card being played (War Drums, Pen Nib, ...).
      fireRelicHook(game, 'onCardPlayed', card, cardDef);

      // Move card
      game.combat.hand.splice(cardIdx, 1);
      if (cardDef.type === CARD_TYPES.POWER) {
        game.combat.activePowers.push(card);
      } else if (cardDef.exhaust) {
        game.combat.exhaustPile.push(card);
      } else {
        game.combat.discardPile.push(card);
      }

      game.combat.energy -= cardDef.cost;
      game.combat.pendingCardUid = null;

      // SFX cue by card type (block/hit cues come from the damage/block floats)
      if (cardDef.type === CARD_TYPES.ATTACK) AudioEngine.sfx('attack');
      else if (cardDef.type === CARD_TYPES.POWER) AudioEngine.sfx('power');

      checkCombatEnd(game);
    }

    function applyEffects(game, card, cardDef, target) {
      const values = (card.upgraded && cardDef.upgradedValues) ? cardDef.upgradedValues : (cardDef.values || {});

      for (const effect of cardDef.effects) {
        if (effect.type === 'DAMAGE') {
          if (cardDef.target === 'ENEMY_ALL') {
            for (const enemy of game.combat.enemies.filter(e => e.alive)) {
              dealDamage(game, game.combat.player, enemy, values[effect.key]);
            }
          } else if (target) {
            dealDamage(game, game.combat.player, target, values[effect.key]);
          }
        } else if (effect.type === 'BLOCK') {
          gainBlock(game.combat.player, values[effect.key]);
        } else if (effect.type === 'DRAW') {
          drawCards(game, effect.value);
        } else if (effect.type === 'ENERGY') {
          game.combat.energy += effect.value;
        } else if (effect.type === 'HEAL') {
          game.run.hp = Math.min(game.run.maxHp, game.run.hp + effect.value);
        } else if (effect.type === 'APPLY_STATUS') {
          if (target) {
            const base = effect.key != null ? values[effect.key] : effect.value;
            applyPlayerStatus(game, target, effect.status, base);
          }
        } else if (effect.type === 'APPLY_SELF_STATUS') {
          const base = effect.key != null ? values[effect.key] : effect.value;
          applyPlayerStatus(game, game.combat.player, effect.status, base);
        }
      }
    }

    function endPlayerTurn(game) {
      // In-hand end-of-turn card effects (e.g. Decay curse).
      for (const card of game.combat.hand) {
        const def = CARDS_DB[card.defId];
        if (def && typeof def.onEndTurnInHand === 'function') def.onEndTurnInHand(game, card);
      }

      game.combat.discardPile.push(...game.combat.hand);
      game.combat.hand = [];

      tickStatusesEndOfTurn(game.combat.player);

      if (game.run.hp <= 0) { checkCombatEnd(game); return; }

      game.combat.phase = 'ENEMY';
      runEnemyTurn(game);
    }

    function runEnemyTurn(game) {
      for (const enemy of game.combat.enemies.filter(e => e.alive)) {
        enemy.block = 0;
        tickStatusesStartOfTurn(game, enemy);
        if (allEnemiesDefeated(game)) { checkCombatEnd(game); return; }
        if (!enemy.alive) continue;
        executeIntent(game, enemy);
        if (game.run.hp <= 0 || allEnemiesDefeated(game)) { checkCombatEnd(game); return; }
      }

      if (allEnemiesDefeated(game)) { checkCombatEnd(game); return; }

      for (const enemy of game.combat.enemies) {
        tickStatusesEndOfTurn(enemy);
        chooseIntent(game, enemy);
      }

      game.combat.turnNum++;
      startPlayerTurn(game);
    }

    function executeIntent(game, enemy) {
      if (!enemy.intent) return;

      const intent = enemy.intent;
      switch (intent.type) {
        case 'ATTACK':
          dealDamage(game, enemy, game.combat.player, intent.value);
          break;
        case 'ATTACK_ALL':
          dealDamage(game, enemy, game.combat.player, intent.value);
          break;
        case 'BUFF_MIGHT':
          applyStatus(enemy, 'might', intent.value);
          break;
        case 'BLOCK_INTENT':
          gainBlock(enemy, intent.value);
          break;
        case 'SAPPED':
          applyStatus(game.combat.player, 'sapped', intent.value);
          break;
        case 'EXPOSED':
          applyStatus(game.combat.player, 'exposed', intent.value);
          break;
        case 'BLIGHT':
          applyStatus(game.combat.player, 'blight', intent.value);
          break;
        case 'HEAL': {
          const wounded = game.combat.enemies.filter(e => e.alive && e.hp < e.maxHp);
          const target = wounded.sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp))[0] || enemy;
          target.hp = Math.min(target.maxHp, target.hp + intent.value);
          game.combat.log.push(`${enemy.name} healed ${target.name} for ${intent.value}.`);
          break;
        }
        case 'ADD_CURSE': {
          const cardId = intent.cardId || 'curse-doubt';
          game.combat.discardPile.push({ uid: uid(), defId: cardId, upgraded: false });
          game.combat.log.push(`${enemy.name} added ${CARDS_DB[cardId].name} to your discard pile.`);
          break;
        }
        case 'SUMMON': {
          summonEnemy(game, intent.enemyId || 'wraith');
          game.combat.log.push(`${enemy.name} summoned help!`);
          break;
        }
      }
    }

    function parseIntentToken(token) {
      if (!token) return { type: 'UNKNOWN', value: 0 };
      const numeric = (regex, type) => {
        const match = token.match(regex);
        return match ? { type, value: parseInt(match[1], 10) } : null;
      };
      return numeric(/^ATK(\d+)$/, 'ATTACK')
        || numeric(/^ATK-ALL(\d+)$/, 'ATTACK_ALL')
        || numeric(/^SAPPED(\d+)$/, 'SAPPED')
        || numeric(/^EXPOSED(\d+)$/, 'EXPOSED')
        || numeric(/^BLIGHT(\d+)$/, 'BLIGHT')
        || numeric(/^BUFF_MIGHT(\d+)$/, 'BUFF_MIGHT')
        || numeric(/^BLOCK(\d+)$/, 'BLOCK_INTENT')
        || numeric(/^HEAL(\d+)$/, 'HEAL')
        || { type: 'UNKNOWN', value: 0, raw: token };
    }

    function chooseIntent(game, enemy) {
      let intentStr;

      if (enemy.template.getIntent) {
        const result = enemy.template.getIntent(enemy, game.combat);
        enemy.intent = result || { type: 'UNKNOWN', value: 0 };
      } else if (enemy.template.pattern) {
        intentStr = enemy.template.pattern[enemy.intentIndex % enemy.template.pattern.length];
        enemy.intentIndex++;
        enemy.intent = parseIntentToken(intentStr);
      }
    }

    function checkCombatEnd(game) {
      if (game.run.hp <= 0) {
        recordRunResult(game, false);
        goTo(SCREENS.GAMEOVER);
        return;
      }

      const allDead = game.combat.enemies.every(e => e.hp <= 0 || !e.alive);
      if (!allDead) return;

      for (const enemy of game.combat.enemies) {
        if (enemy.hp <= 0) enemy.alive = false;
      }

      const isElite = game.combat.enemies.some(e => e.template.isElite);
      const isBoss = game.combat.enemies.some(e => e.template.isBoss);

      const eventReward = game.ui.eventRewardOverride || null;
      let gold = rollCombatGold(game, isElite, isBoss) + (eventReward && eventReward.gold ? eventReward.gold : 0);
      game.run.gold += gold;
      AudioEngine.sfx('reward');
      game.combat.log.push(`Combat won! Gained ${gold} gold.`);

      let relicId = null;
      let maxHpGained = 0;
      let eventRewardText = eventReward && eventReward.text ? eventReward.text : '';
      if (isElite) {
        relicId = getRandomRelic(game);
        if (relicId) grantRelic(game, relicId);
        maxHpGained = gainMaxHp(game, 2, true);
      }
      if (eventReward) {
        if (eventReward.relicId === 'random') {
          const eventRelic = getRandomRelic(game);
          if (eventRelic) { grantRelic(game, eventRelic); relicId = relicId || eventRelic; }
        } else if (eventReward.relicId && RELICS_DB[eventReward.relicId]) {
          grantRelic(game, eventReward.relicId);
          relicId = relicId || eventReward.relicId;
        }
        if (eventReward.maxHp) maxHpGained += gainMaxHp(game, eventReward.maxHp, true);
        fireNonCombatRelicHook(game, 'onEventComplete', { eventCombat: true, reward: eventReward });
        game.ui.eventRewardOverride = null;
      }

      // End-of-combat relic hooks (Prayer Beads, Hand of Greed, Vulture Feather, ...).
      fireRelicHook(game, 'onCombatEnd', { isElite, isBoss });

      if (isBoss) {
        recordRunResult(game, true);
        goTo(SCREENS.VICTORY);
        return;
      }

      // Build a reward bundle: gold (already granted) + maybe a potion + a card choice.
      let potionId = null;
      const potionSlotFree = game.run.potions.some(p => p === null);
      if (eventReward && eventReward.potionId) {
        potionId = eventReward.potionId;
      } else if (potionSlotFree && rand() < 0.30) {
        potionId = pickOne(Object.keys(POTIONS_DB));
      }
      game.ui.combatReward = {
        gold,
        potionId,
        potionTaken: false,
        relicId,
        maxHpGained,
        eventRewardText,
        isElite,
        isBoss
      };
      goTo(SCREENS.CARD_REWARD);
    }

    function startEventCombat(game, enemyIds, rewardOverride) {
      game.ui.eventRewardOverride = rewardOverride || {};
      startCombat(game, { enemies: enemyIds && enemyIds.length ? enemyIds : ['warden'] });
      goTo(SCREENS.COMBAT);
    }

    function continueEndlessRun(game) {
      if (!game || !game.run) return;
      game.act = (game.act || 1) + 1;
      game.combat = null;
      game.ui = {};
      game.run.floor = 1;
      game.run.currentNodeId = null;
      game.run.seenEventIds = [];
      healRun(game, Math.floor(game.run.maxHp * 0.25), 'Endless respite');
      const bossPool = Object.values(ENEMIES_DB).filter(e => e.isBoss);
      game.run.bossId = pickOne(bossPool).id;
      game.run.bossName = ENEMIES_DB[game.run.bossId].name;
      game.run.map = generateMap();
      goTo(SCREENS.MAP);
    }

    function rollCombatGold(game, isElite, isBoss) {
      const band = encounterBand(game.run.floor);
      const ranges = {
        early: { normal: [12, 20], elite: [35, 50] },
        mid: { normal: [18, 30], elite: [45, 65] },
        late: { normal: [26, 42], elite: [60, 85] }
      };
      let lo, hi;
      if (isBoss) [lo, hi] = [90, 120];
      else [lo, hi] = isElite ? ranges[band].elite : ranges[band].normal;
      let gold = lo + Math.floor(rand() * (hi - lo + 1));
      gold = Math.floor(gold * (1 + Math.max(0, (game.act || 1) - 1) * 0.15));
      if (game.ascension >= 3) gold = Math.floor(gold * 0.85);
      return gold;
    }

    function allEnemiesDefeated(game) {
      return !!(game && game.combat) && game.combat.enemies.every(e => e.hp <= 0 || !e.alive);
    }

    function summonEnemy(game, enemyDefId) {
      const template = ENEMIES_DB[enemyDefId];
      if (!template || !game.combat) return null;
      let hpScale = 1 + Math.max(0, game.run.floor - 1) * 0.035;
      if (game.ascension >= 1) hpScale += 0.10;
      hpScale += Math.max(0, (game.act || 1) - 1) * 0.20;
      const scaledMaxHp = Math.max(1, Math.round(template.maxHp * hpScale));
      const enemy = { uid: uid(), defId: enemyDefId, name: template.name, hp: scaledMaxHp, maxHp: scaledMaxHp, block: 0, statuses: {}, intent: null, alive: true, intentIndex: 0, template };
      chooseIntent(game, enemy);
      game.combat.enemies.push(enemy);
      return enemy;
    }

    function dealDamage(game, source, target, baseAmount, ctx) {
      ctx = ctx || {};
      const isPlayerTarget = target === game.combat.player;
      const sourceIsPlayer = source === game.combat.player;

      let amount = baseAmount + (source.statuses.might || 0);

      // Player attack damage modifiers (Brass Knuckles, Cracked Whetstone, ...).
      // Thorns/reactive damage is not an "attack" and skips these.
      if (sourceIsPlayer && !ctx.thorns) {
        amount = applyRelicModifier(game, 'modifyOutgoingDamage', amount, { isAttack: ctx.isAttack !== false, target });
      }

      if (source.statuses.sapped) amount = Math.floor(amount * 0.75);
      if (target.statuses.exposed) amount = Math.floor(amount * 1.5);
      amount = Math.max(0, amount);

      // Block absorbs first; leftover block persists.
      const blocked = Math.min(target.block, amount);
      target.block -= blocked;
      const hpDamage = amount - blocked;

      if (hpDamage > 0) {
        if (isPlayerTarget) {
          game.run.hp -= hpDamage;
        } else {
          target.hp -= hpDamage;
        }
      }

      game.combat.log.push(`${sourceIsPlayer ? 'You' : (source.name || 'Enemy')} dealt ${hpDamage} damage${blocked > 0 ? ` (${blocked} blocked)` : ''}${isPlayerTarget ? ' to you' : ' to ' + target.name}.`);
      spawnFloatingNumber(isPlayerTarget ? 'player' : target.uid, hpDamage > 0 ? `-${hpDamage}` : (blocked > 0 ? 'blocked' : '0'), hpDamage > 0 ? 'dmg' : 'block');
      if (hpDamage > 0 && !isPlayerTarget) playEffect(target.uid, 'attack');  // fiery burst on the struck enemy

      if (isPlayerTarget) {
        if (game.run.hp <= 0) game.run.hp = 0;
        if (hpDamage > 0) fireRelicHook(game, 'onDamageTaken', hpDamage);
      } else {
        if (sourceIsPlayer && hpDamage > 0) fireRelicHook(game, 'onDamageDealt', hpDamage);
        if (target.hp <= 0) {
          target.hp = 0;
          if (target.alive) {
            target.alive = false;
            AudioEngine.sfx('death');
            game.combat.log.push(`${target.name} was defeated!`);
            if (target.template && typeof target.template.onDeath === 'function') target.template.onDeath(game, target);
          }
        }
      }
    }

    function gainBlock(entity, amount) {
      entity.block += amount + (entity.statuses && entity.statuses.warded ? entity.statuses.warded : 0);
      // Shield-orb feedback only when the player gains block (not enemies, not combat-start relics before render).
      if (STATE && STATE.combat && entity === STATE.combat.player) playEffect('player', 'block');
    }

    function applyStatus(entity, statusName, stacks) {
      if (!entity || !entity.statuses || !statusName || !stacks) return;
      if (!entity.statuses[statusName]) entity.statuses[statusName] = 0;
      entity.statuses[statusName] += stacks;
    }

    function applyPlayerStatus(game, entity, statusName, stacks) {
      const modified = applyRelicModifier(game, 'modifyStatusApply', stacks, statusName);
      applyStatus(entity, statusName, modified);
    }

    function tickStatusesStartOfTurn(game, entity) {
      const isPlayer = entity === game.combat.player;

      if (entity.statuses.mending) {
        const heal = entity.statuses.mending;
        if (isPlayer) game.run.hp = Math.min(game.run.maxHp, game.run.hp + heal);
        else entity.hp = Math.min(entity.maxHp, entity.hp + heal);
        entity.statuses.mending--;
        if (entity.statuses.mending <= 0) delete entity.statuses.mending;
      }

      if (entity.statuses.blight) {
        const dmg = entity.statuses.blight;
        if (isPlayer) game.run.hp = Math.max(0, game.run.hp - dmg);
        else { entity.hp -= dmg; if (entity.hp <= 0) { entity.hp = 0; entity.alive = false; } }
        entity.statuses.blight--;
        if (entity.statuses.blight <= 0) delete entity.statuses.blight;
      }
    }

    function tickStatusesEndOfTurn(entity) {
      if (entity.statuses.sapped) {
        entity.statuses.sapped--;
        if (entity.statuses.sapped <= 0) delete entity.statuses.sapped;
      }

      if (entity.statuses.exposed) {
        entity.statuses.exposed--;
        if (entity.statuses.exposed <= 0) delete entity.statuses.exposed;
      }
    }

    // ============ 8. NON-COMBAT LOGIC ============

    function applyRest(game, choice) {
      const node = game.run.map.nodes.find(n => n.id === game.run.currentNodeId);
      const triggerRestRelics = () => {
        if (node && !node.restRelicTriggered) {
          fireNonCombatRelicHook(game, 'onRest', { node, choice });
          node.restRelicTriggered = true;
        }
      };
      if (choice === 'rest') {
        const heal = Math.floor(game.run.maxHp * 0.3);
        healRun(game, heal, 'Rest');
        triggerRestRelics();
        goTo(SCREENS.MAP);
      } else if (choice === 'refine') {
        triggerRestRelics();
        game.ui.picker = { purpose: 'refine' };
        render();
      }
    }

    function applyShop(game) {
      const node = game.run.map.nodes.find(n => n.id === game.run.currentNodeId);
      if (!node.shopInventory) {
        node.shopInventory = {
          cards: generateShopCards(game),
          relics: generateShopRelics(game),
          potions: generateShopPotions()
        };
      }
      if (!node.shopRelicTriggered) {
        fireNonCombatRelicHook(game, 'onShopEnter', { node });
        node.shopRelicTriggered = true;
      }
    }

    function generateShopCards(game) {
      const cards = [];
      const picked = new Set();
      let guard = 0;
      while (cards.length < 5 && guard++ < 50) {
        const rarity = weightedPick(RARITY_WEIGHTS);
        const cardPool = Object.values(CARDS_DB).filter(c => c.rarity === rarity && c.rarity !== CARD_RARITIES.BASIC && c.type !== CARD_TYPES.CURSE && !picked.has(c.id));
        if (cardPool.length > 0) {
          const card = cardPool[Math.floor(rand() * cardPool.length)];
          picked.add(card.id);
          const price = { COMMON: 55, UNCOMMON: 85, RARE: 140 }[rarity];
          const jitter = Math.floor((rand() - 0.5) * 20);
          cards.push({ id: card.id, name: card.name, price: price + jitter });
        }
      }
      return cards;
    }

    function generateShopRelics(game) {
      const relics = [];
      const picked = [];
      const count = 2 + Math.floor(rand() * 2);
      for (let i = 0; i < count; i++) {
        const relic = getRandomRelic(game, picked);
        if (!relic) break; // no unowned relics left
        picked.push(relic);
        const price = 150 + Math.floor(rand() * 50);
        relics.push({ id: relic, name: RELICS_DB[relic].name, price });
      }
      return relics;
    }

    function generateShopPotions() {
      const potions = [];
      const count = 1 + Math.floor(rand() * 2);
      for (let i = 0; i < count; i++) {
        const potion = Object.values(POTIONS_DB)[Math.floor(rand() * Object.values(POTIONS_DB).length)];
        const price = 40 + Math.floor(rand() * 20);
        potions.push({ id: potion.id, name: potion.name, price });
      }
      return potions;
    }

    function applyEvent(game) {
      if (game.ui.eventDef) return;
      let unseen = EVENTS_DB.filter(e => !game.run.seenEventIds.includes(e.id));
      if (unseen.length === 0) {
        game.run.seenEventIds = [];
        unseen = EVENTS_DB.slice();
      }
      const event = unseen[Math.floor(rand() * unseen.length)];
      game.run.seenEventIds.push(event.id);
      game.ui.eventDef = event;
    }

    // ============ 9. NAVIGATION ============

    function goTo(screen, payload) {
      STATE.screen = screen;

      if (screen === SCREENS.SHOP) {
        applyShop(STATE);
      } else if (screen === SCREENS.EVENT) {
        applyEvent(STATE);
      } else if (screen === SCREENS.CARD_REWARD) {
        if (!STATE.ui.cardRewardChoices || STATE.ui.cardRewardChoices.length === 0) STATE.ui.cardRewardChoices = generateCardReward(STATE);
      }

      render();
      saveGame(STATE);
    }

    function generateCardReward(game) {
      const choices = [];
      const used = new Set();
      const reward = game.ui && game.ui.combatReward ? game.ui.combatReward : {};
      const weights = reward.isBoss ? BOSS_RARITY_WEIGHTS : reward.isElite ? ELITE_RARITY_WEIGHTS : RARITY_WEIGHTS;
      let guard = 0;
      while (choices.length < 3 && guard++ < 30) {
        const rarity = weightedPick(weights);
        const cardPool = Object.values(CARDS_DB).filter(c => c.rarity === rarity && c.rarity !== CARD_RARITIES.BASIC && c.type !== CARD_TYPES.CURSE && !used.has(c.id));
        if (cardPool.length > 0) {
          const card = cardPool[Math.floor(rand() * cardPool.length)];
          used.add(card.id);
          choices.push(card);
        }
      }
      if (choices.length < 3) {
        for (const card of Object.values(CARDS_DB).filter(c => c.rarity !== CARD_RARITIES.BASIC && c.type !== CARD_TYPES.CURSE && !used.has(c.id))) {
          used.add(card.id);
          choices.push(card);
          if (choices.length >= 3) break;
        }
      }
      return choices;
    }

    function selectCardReward(game, cardDef) {
      if (cardDef) {
        game.run.deck.push({ uid: uid(), defId: cardDef.id, upgraded: false });
      }
      game.ui.cardRewardChoices = null;
      game.ui.combatReward = null;
      saveGame(game);
      goTo(SCREENS.MAP);
    }

    function startNewRun(opts) {
      opts = opts || {};
      const seed = opts.seed != null ? opts.seed : ((Math.random() * 4294967296) >>> 0);
      seedRng(seed);

      STATE = {
        screen: SCREENS.MENU,
        run: createNewRun(opts.characterId),
        combat: null,
        ui: {},
        seed: seed,
        ascension: opts.ascension || 0,
        act: 1,
        lastRunOptions: { characterId: opts.characterId || 'cinder-knight', ascension: opts.ascension || 0 }
      };
      if (STATE.ascension >= 5) STATE.run.deck.push({ uid: uid(), defId: 'curse-doubt', upgraded: false });
      // Choose the boss up front so the player can plan around it.
      const bossPool = Object.values(ENEMIES_DB).filter(e => e.isBoss);
      STATE.run.bossId = pickOne(bossPool).id;
      STATE.run.bossName = ENEMIES_DB[STATE.run.bossId].name;
      STATE.run.map = generateMap();
      clearSave();
      render();
    }

    // ============ 10. RENDER ============

    // ============ AUDIO ENGINE ============
    // Music (one looping element) + SFX (cached, cloned so they overlap).
    // Assets live in assets/audio/. Autoplay is unlocked on the first user
    // gesture (mobile WebViews block it). Mute persists in localStorage.
    // Music WAVs loop gaplessly; transcode to OGG later to shrink the payload.
    const AudioEngine = (function () {
      const BASE = 'assets/audio/';
      const MUSIC_FILES = {
        menu:    BASE + 'music/menu.wav',
        combat:  BASE + 'music/combat.wav',
        boss:    BASE + 'music/boss.wav',
        victory: BASE + 'music/victory.wav',
        defeat:  BASE + 'music/defeat.wav',
      };
      const SFX_FILES = {
        click:  BASE + 'sfx/click.wav',
        attack: BASE + 'sfx/attack.mp3',
        hit:    BASE + 'sfx/hit.mp3',
        block:  BASE + 'sfx/block.mp3',
        heal:   BASE + 'sfx/heal.mp3',
        power:  BASE + 'sfx/power.mp3',
        reward: BASE + 'sfx/reward.mp3',
        draw:   BASE + 'sfx/draw.mp3',
        death:  BASE + 'sfx/death.mp3',
        potion: BASE + 'sfx/potion.mp3',
      };
      const SFX_VOL = { click: 0.3, _default: 0.6 };
      const MUSIC_VOL = 0.35;

      let muted = false;
      try { muted = localStorage.getItem('cinderMuted') === '1'; } catch (e) {}
      let unlocked = false;
      let curKey = null;      // music key currently selected
      let pendingKey = null;  // desired key before the first gesture unlock
      const musicEl = new Audio();
      musicEl.loop = true;
      musicEl.volume = MUSIC_VOL;
      const sfxCache = {};

      function loadSfx(key) {
        if (!sfxCache[key] && SFX_FILES[key]) {
          const a = new Audio(SFX_FILES[key]);
          a.preload = 'auto';
          sfxCache[key] = a;
        }
        return sfxCache[key];
      }

      function playMusicKey(key) {
        if (!key || !MUSIC_FILES[key]) return;
        curKey = key;
        if (muted || !unlocked) return;
        const src = MUSIC_FILES[key];
        if (!musicEl.src || !musicEl.src.endsWith(src)) { musicEl.src = src; }
        const p = musicEl.play();
        if (p && p.catch) p.catch(() => {});
      }

      function screenToKey(state) {
        if (!state) return 'menu';
        switch (state.screen) {
          case 'COMBAT': {
            const enemies = (state.combat && state.combat.enemies) || [];
            const heavy = enemies.some(e => e.template && (e.template.isBoss || e.template.isElite));
            return heavy ? 'boss' : 'combat';
          }
          case 'VICTORY':  return 'victory';
          case 'GAMEOVER': return 'defeat';
          case 'MENU':     return 'menu';
          default:         return 'menu'; // map/rest/shop/event/reward/treasure share the calm theme
        }
      }

      return {
        updateMusic(state) {
          const key = screenToKey(state);
          if (!unlocked) { pendingKey = key; curKey = key; return; }
          if (key === curKey && !musicEl.paused) return;
          playMusicKey(key);
        },
        sfx(key) {
          if (muted || !unlocked) return;
          const base = loadSfx(key);
          if (!base) return;
          try {
            const node = base.cloneNode();
            node.volume = SFX_VOL[key] || SFX_VOL._default;
            const p = node.play();
            if (p && p.catch) p.catch(() => {});
          } catch (e) {}
        },
        unlock() {
          if (unlocked) return;
          unlocked = true;
          playMusicKey(pendingKey || curKey || 'menu');
        },
        toggleMute() {
          muted = !muted;
          try { localStorage.setItem('cinderMuted', muted ? '1' : '0'); } catch (e) {}
          if (muted) musicEl.pause();
          else if (unlocked) playMusicKey(curKey || 'menu');
          return muted;
        },
        isMuted() { return muted; },
      };
    })();

    function render() {
      const app = document.getElementById('app');

      // Overlays (card picker / pile viewer) use the same single-render strategy.
      if (STATE.ui && STATE.ui.pileViewer) {
        app.innerHTML = renderPileViewer();
        return;
      }
      if (STATE.ui && STATE.ui.picker) {
        app.innerHTML = renderCardPicker();
        return;
      }

      let html = '';
      switch (STATE.screen) {
        case SCREENS.MENU:
          html = renderMenu();
          break;
        case SCREENS.MAP:
          html = renderMap();
          break;
        case SCREENS.COMBAT:
          html = renderCombat();
          break;
        case SCREENS.REST:
          html = renderRest();
          break;
        case SCREENS.SHOP:
          html = renderShop();
          break;
        case SCREENS.EVENT:
          html = renderEvent();
          break;
        case SCREENS.CARD_REWARD:
          html = renderCardReward();
          break;
        case SCREENS.TREASURE:
          html = renderTreasure();
          break;
        case SCREENS.VICTORY:
          html = renderVictory();
          break;
        case SCREENS.GAMEOVER:
          html = renderGameOver();
          break;
      }

      app.innerHTML = html;
      if (STATE.screen === SCREENS.MAP) requestAnimationFrame(scrollMapToFocus);
      AudioEngine.updateMusic(STATE);
    }

    function scrollMapToFocus() {
      const target = document.querySelector('.map-node.current') || document.querySelector('.map-node.available');
      if (target && typeof target.scrollIntoView === 'function') target.scrollIntoView({ block: 'center', inline: 'center' });
    }

    function describeAscension(level) {
      if (!level) return 'No ascension modifiers.';
      return ASCENSIONS.filter(a => a.level <= level).map(a => `A${a.level}: ${a.name} — ${a.desc}`).join('\n');
    }

    function renderMenu() {
      const meta = loadMeta();
      const saveButton = hasSave() ? '<button class="menu-button" data-action="continueRun">Continue Run</button>' : '';
      const ascMax = Math.max(0, meta.highestAscensionUnlocked || 0);
      const shownAscensions = Array.from({ length: Math.min(ascMax, 5) + 1 }, (_, i) => i);
      const ascensionText = ASCENSIONS.slice(0, Math.max(0, ascMax)).map(a => `A${a.level}: ${a.name}`).join(' · ');
      const characterButtons = Object.values(CHARACTERS_DB).map(ch => `
        <div style="margin-bottom: 12px;">
          <div style="font-weight:bold; margin-bottom:4px;">${ch.name}</div>
          <div style="color: var(--text-muted); font-size: 0.78em; margin-bottom: 6px;">${ch.blurb}</div>
          ${shownAscensions.map(a => `<button class="inline-chip-button" data-action="startGame" data-characterid="${ch.id}" data-ascension="${a}" title="${describeAscension(a)}">Start A${a}</button>`).join('')}
        </div>
      `).join('');
      const recent = (meta.runs || []).slice(0, 3).map(r => `<div class="stat-line"><span>${r.won ? 'Win' : 'Loss'} · ${r.character}</span><span>F${r.floor} · A${r.ascension || 0}</span></div>`).join('') || '<div class="stat-line"><span>No runs yet</span><span>—</span></div>';
      return `
        <div class="screen menu-screen">
          <div class="menu-panel">
            <div class="menu-title">${icon('t-menu','icon-title')} THE CINDER VAULT ${icon('t-menu','icon-title')}</div>
            <div class="menu-subtitle">A Text-Based Roguelike Deckbuilder</div>
            ${saveButton}
            <div style="margin: 20px 0 10px; color: var(--text-muted);">Start a new run</div>
            ${characterButtons}
            <div class="stats-box">
              <div class="stat-line"><span>Wins / Losses:</span><span>${meta.wins || 0} / ${meta.losses || 0}</span></div>
              <div class="stat-line"><span>Best Floor:</span><span>${meta.bestFloor || 0}</span></div>
              <div class="stat-line"><span>Best Gold:</span><span>${meta.bestGold || 0}</span></div>
              <div class="stat-line"><span>Ascension Unlocked:</span><span>${ascMax}</span></div>
            </div>
            ${ascMax > 0 ? `<div class="stats-box"><div style="color: var(--text-muted); margin-bottom: 6px;">Ascension Modifiers</div><div style="font-size:0.78em; color:var(--text-muted);">${ascensionText}</div></div>` : ''}
            <div class="stats-box">
              <div style="color: var(--text-muted); margin-bottom: 6px;">Recent Runs</div>
              ${recent}
            </div>
            <div style="color: var(--text-muted); font-size: 0.85em; text-align: center; margin-top: 20px;">
              Navigate a branching path. Build your deck. Defeat the vault boss.
            </div>
            ${DEV_TOOLS ? '<div class="debug-panel">Debug: open the console and use <code>CINDER_DEBUG</code> for validation, seed, and balance helpers.</div>' : ''}
          </div>
        </div>
      `;
    }

    function nodeScreenPos(node) {
      // x from col (centered within COLS lanes), y from floor (floor 1 at bottom).
      const laneW = LAYOUT.COL_WIDTH;
      const x = (node.col + 0.5) * laneW + MAP_PAD_X;
      const y = (LAYOUT.FLOORS - node.floor) * LAYOUT.FLOOR_HEIGHT + LAYOUT.FLOOR_HEIGHT / 2 + MAP_PAD_Y;
      return { x, y };
    }

    const MAP_PAD_X = 30;
    const MAP_PAD_Y = 20;

    function renderMap() {
      const available = availableNodeIds(STATE);
      const currentId = STATE.run.currentNodeId;
      const nodes = STATE.run.map.nodes;

      const canvasW = LAYOUT.COLS * LAYOUT.COL_WIDTH + MAP_PAD_X * 2;
      const canvasH = LAYOUT.FLOORS * LAYOUT.FLOOR_HEIGHT + MAP_PAD_Y * 2;

      // Map node icons are rendered via the global nodeIcon() helper (see icon infrastructure).

      // Edges (drawn first, behind nodes).
      let edgesHTML = '';
      for (const node of nodes) {
        const from = nodeScreenPos(node);
        for (const connId of node.connections) {
          const target = nodes.find(n => n.id === connId);
          if (!target) continue;
          const to = nodeScreenPos(target);
          // An edge is "reachable" if it leads out of the node you're standing on.
          const reachable = node.id === currentId && available.includes(connId);
          edgesHTML += `<line class="map-edge ${reachable ? 'reachable' : ''}" x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" />`;
        }
      }

      const nodesHTML = nodes.map(node => {
        const pos = nodeScreenPos(node);
        const isAvailable = available.includes(node.id);
        const isCurrent = node.id === currentId;
        const statusClass = isCurrent ? 'current' : node.visited ? 'visited' : isAvailable ? 'available' : 'locked';
        const typeClass = node.type === NODE_TYPES.ELITE ? 'elite-node' : node.type === NODE_TYPES.BOSS ? 'boss-node' : '';
        const label = node.type === NODE_TYPES.BOSS && STATE.run.bossName ? STATE.run.bossName : node.type;
        return `
          <div class="map-node ${statusClass} ${typeClass}" style="left:${pos.x}px; top:${pos.y}px;"
               data-nodeid="${node.id}" ${isAvailable ? `data-action="travelNode"` : ''}
               title="${label}">
            <div class="map-node-icon">${nodeIcon(node.type)}</div>
            <div class="map-node-type">${node.type === NODE_TYPES.BOSS ? 'BOSS' : node.type}</div>
          </div>
        `;
      }).join('');

      // Floor labels down the left edge.
      let floorLabels = '';
      for (let f = 1; f <= LAYOUT.FLOORS; f++) {
        const y = (LAYOUT.FLOORS - f) * LAYOUT.FLOOR_HEIGHT + LAYOUT.FLOOR_HEIGHT / 2 + MAP_PAD_Y;
        floorLabels += `<div class="map-floor-label" style="top:${y}px;">F${f}</div>`;
      }

      return `
        <div class="screen">
          ${renderStatusBar()}
          <div class="map-screen">
            <div class="map-canvas" style="width:${canvasW}px; height:${canvasH}px;">
              <svg class="map-edges" viewBox="0 0 ${canvasW} ${canvasH}" preserveAspectRatio="none">${edgesHTML}</svg>
              ${floorLabels}
              ${nodesHTML}
            </div>
          </div>
        </div>
      `;
    }

    // Accepts a card instance ({defId, upgraded}) or a raw card def.
    // `forceUpgraded` overrides the upgrade flag (used to preview upgrades).
    function describeCard(cardOrDef, forceUpgraded) {
      const def = cardOrDef.defId ? CARDS_DB[cardOrDef.defId] : cardOrDef;
      const upgraded = forceUpgraded != null ? forceUpgraded : !!cardOrDef.upgraded;
      if (def.desc) return typeof def.desc === 'function' ? def.desc(upgraded) : def.desc;
      const v = (upgraded && def.upgradedValues) ? def.upgradedValues : (def.values || {});
      const statusNames = { might: 'Might', sapped: 'Sapped', exposed: 'Exposed', blight: 'Blight', mending: 'Mending', warded: 'Warded' };
      const parts = [];
      for (const eff of (def.effects || [])) {
        const amt = eff.key != null ? v[eff.key] : eff.value;
        if (eff.type === 'DAMAGE') parts.push(`Deal ${amt} damage${def.target === 'ENEMY_ALL' ? ' to ALL' : ''}.`);
        else if (eff.type === 'BLOCK') parts.push(`Gain ${amt} block.`);
        else if (eff.type === 'DRAW') parts.push(`Draw ${amt}.`);
        else if (eff.type === 'ENERGY') parts.push(`Gain ${amt} energy.`);
        else if (eff.type === 'HEAL') parts.push(`Heal ${amt}.`);
        else if (eff.type === 'APPLY_STATUS') parts.push(`Apply ${amt} ${statusNames[eff.status] || eff.status}${def.target === 'ENEMY_ALL' ? ' to ALL' : ''}.`);
        else if (eff.type === 'APPLY_SELF_STATUS') parts.push(`Gain ${amt} ${statusNames[eff.status] || eff.status}.`);
      }
      if (def.exhaust) parts.push('Exhaust.');
      return parts.join(' ');
    }

    function previewEnemyAttack(enemy, player) {
      if (!enemy.intent || (enemy.intent.type !== 'ATTACK' && enemy.intent.type !== 'ATTACK_ALL')) return '';
      let amount = enemy.intent.value + (enemy.statuses.might || 0);
      if (enemy.statuses.sapped) amount = Math.floor(amount * 0.75);
      if (player.statuses.exposed) amount = Math.floor(amount * 1.5);
      return Math.max(0, amount);
    }

    function renderCombat() {
      const { enemies, player, hand, energy, energyMax, log } = STATE.combat;

      const targeting = !!STATE.combat.pendingCardUid || STATE.combat.pendingPotionSlot !== null;
      const intentDesc = {
        ATTACK: 'Attacks', ATTACK_ALL: 'Attacks', BUFF_MIGHT: 'Buffing Might',
        BLOCK_INTENT: 'Defending', SAPPED: 'Weakening you', EXPOSED: 'Exposing you',
        BLIGHT: 'Poisoning you', HEAL: 'Healing', ADD_CURSE: 'Cursing your deck',
        SUMMON: 'Summoning help', UNKNOWN: 'Unknown'
      };
      const enemyHTML = enemies.filter(e => e.alive).map(enemy => {
        const hpPercent = Math.max(0, Math.min(100, (enemy.hp / enemy.maxHp) * 100));
        const statusHTML = Object.entries(enemy.statuses).filter(([k, v]) => v > 0).map(([k, v]) => {
          return `<div class="status-chip" title="${statusTitle(k, v)}">${statusIcon(k)}<span class="chip-count">${v}</span></div>`;
        }).join('');

        const it = enemy.intent ? enemy.intent.type : 'UNKNOWN';
        const intentIcon = intentIconFor(it);
        const showValue = ['ATTACK','ATTACK_ALL','BUFF_MIGHT','BLOCK_INTENT','SAPPED','EXPOSED','BLIGHT','HEAL','ADD_CURSE'].includes(it);
        const intentValue = showValue ? (it === 'ATTACK' || it === 'ATTACK_ALL' ? previewEnemyAttack(enemy, STATE.combat.player) : (enemy.intent.value || 1)) : '';

        return `
          <div class="enemy-panel ${targeting ? 'targetable' : ''}" data-enemyuid="${enemy.uid}" ${targeting ? `data-action="targetEnemy"` : ''} title="${intentDesc[it] || ''}">
            <div class="enemy-intent">${intentIcon} ${intentValue}</div>
            <div class="enemy-name">${enemy.name}</div>
            <div class="hp-display"><span>HP</span><span>${enemy.hp} / ${enemy.maxHp}</span></div>
            <div class="hp-bar-long"><div class="hp-fill-long" style="width: ${hpPercent}%"></div></div>
            ${enemy.block > 0 ? `<div class="block-display">${icon('block','icon-block')} ${enemy.block}</div>` : ''}
            <div class="statuses">${statusHTML}</div>
          </div>
        `;
      }).join('');

      const playerStatusHTML = Object.entries(player.statuses).filter(([k, v]) => v > 0).map(([k, v]) => {
        return `<div class="status-chip" title="${statusTitle(k, v)}">${statusIcon(k)}<span class="chip-count">${v}</span></div>`;
      }).join('');

      const energyOrbs = Array(Math.max(energyMax, energy)).fill(0).map((_, i) => `<div class="energy-orb ${i < energy ? 'full' : 'empty'}">${i < energy ? icon('energy') : ''}</div>`).join('');
      const activePowerHTML = (STATE.combat.activePowers || []).map(card => {
        const def = CARDS_DB[card.defId];
        return def ? `<span class="active-power-chip" title="${describeCard(card)}">${def.name}${card.upgraded ? '+' : ''}</span>` : '';
      }).join('');

      const potionsHTML = STATE.run.potions.map((pid, slot) => {
        if (!pid) return `<div class="potion-slot empty" title="Empty potion slot">·</div>`;
        const pdef = POTIONS_DB[pid];
        const selected = STATE.combat.pendingPotionSlot === slot;
        return `<div class="potion-slot" data-action="usePotion" data-slot="${slot}" title="${pdef.name}: ${pdef.desc || 'Use potion'}${selected ? ' — select a target or press Esc' : ''}">${potionIcon(pid)}</div>`;
      }).join('');

      const handHTML = hand.map(card => {
        const cardDef = CARDS_DB[card.defId];
        const typeClass = cardDef.type.toLowerCase();
        const affordable = cardDef.cost <= energy;
        return `
          <div class="card ${typeClass} ${affordable ? '' : 'unaffordable'}" data-action="selectCard" data-carduid="${card.uid}" title="${cardDef.name}">
            <div class="card-cost">${cardDef.cost}</div>
            <div class="card-name">${cardDef.name}${card.upgraded ? '+' : ''}</div>
            <div class="card-art">${cardArtIcon(card.defId, cardDef.type)}</div>
            <div class="card-type">${typeIcon(cardDef.type)} ${cardDef.type}</div>
            <div class="card-desc">${describeCard(card)}</div>
          </div>
        `;
      }).join('');

      const logHTML = log.slice(-5).reverse().map(entry => `<div class="combat-log-entry">${entry}</div>`).join('');

      return `
        <div class="screen combat-screen">
          ${renderStatusBar()}
          <div class="combat-enemies">${enemyHTML}</div>
          <div class="player-section">
            <div class="player-panel">
              <div style="text-align: center; font-weight: bold;">Player</div>
              <div class="hp-display"><span>HP</span><span>${STATE.run.hp} / ${STATE.run.maxHp}</span></div>
              <div class="hp-bar-long"><div class="hp-fill-long" style="width: ${(STATE.run.hp / STATE.run.maxHp) * 100}%"></div></div>
              ${player.block > 0 ? `<div class="block-display" style="margin-top: 8px;">${icon('block','icon-block')} ${player.block}</div>` : ''}
              <div class="energy-display">${energyOrbs}</div>
              <div style="text-align:center; color: var(--text-muted); font-size: 0.8em;">Energy ${energy}/${energyMax}</div>
              <div class="statuses" style="justify-content: center;">${playerStatusHTML}</div>
              <div class="potion-row">${potionsHTML}</div>
            </div>
            <div class="hand-section">
              <div style="font-size: 0.9em; color: var(--text-muted);">
                Hand (${hand.length}/${LAYOUT.HAND_SIZE})
                <button class="inline-chip-button" data-action="viewPile" data-pile="drawPile">Draw ${STATE.combat.drawPile.length}</button>
                <button class="inline-chip-button" data-action="viewPile" data-pile="discardPile">Discard ${STATE.combat.discardPile.length}</button>
                <button class="inline-chip-button" data-action="viewPile" data-pile="exhaustPile">Exhaust ${STATE.combat.exhaustPile.length}</button>
                <button class="inline-chip-button" data-action="viewPile" data-pile="activePowers">Powers ${(STATE.combat.activePowers || []).length}</button>
                <button class="inline-chip-button" data-action="viewPile" data-pile="deck">${icon('deck')} Deck ${STATE.run.deck.length}</button>
              </div>
              ${activePowerHTML ? `<div style="font-size:0.85em; color: var(--text-muted);">Active Powers: ${activePowerHTML}</div>` : ''}
              ${targeting ? '<div style="color: var(--color-gold); font-size: 0.85em;">Choose a target, or tap Cancel (or the selected card/potion again) to cancel.</div>' : ''}
              <div class="combat-hand">${handHTML}</div>
              <div class="combat-log">Log:<br>${logHTML}</div>
            </div>
          </div>
          <div class="combat-controls">
            ${targeting ? '<button class="end-turn-btn" data-action="cancelTargeting">Cancel</button>' : ''}
            <button class="end-turn-btn" data-action="endTurn">End Turn</button>
          </div>
        </div>
      `;
    }

    function renderRest() {
      const healAmt = Math.floor(STATE.run.maxHp * 0.3);
      return `
        <div class="screen center-panel-screen">
          <div class="center-panel">
            <div class="panel-title">${icon('t-rest','icon-title')} Rest Site ${icon('t-rest','icon-title')}</div>
            <div class="panel-content">
              <div class="panel-text">You've reached a safe place to rest. Choose your action:</div>
              <button class="choice-button" data-action="applyRestChoice" data-choice="rest">
                <span class="choice-label">Rest</span>
                <span class="choice-desc">Heal ${healAmt} HP (30% of max)</span>
              </button>
              <button class="choice-button" data-action="applyRestChoice" data-choice="refine">
                <span class="choice-label">Refine (Upgrade a Card)</span>
                <span class="choice-desc">Pick one card from your deck to permanently upgrade</span>
              </button>
            </div>
            <button class="leave-button" data-action="leaveRest">Continue</button>
          </div>
        </div>
      `;
    }

    function renderShop() {
      const node = STATE.run.map.nodes.find(n => n.id === STATE.run.currentNodeId);
      const { cards, relics, potions } = node.shopInventory;
      const gold = STATE.run.gold;

      const shopItem = (label, price, sold, canBuy, action, dataAttr, desc, iconHtml) => {
        const affordable = !sold && canBuy && gold >= price;
        const style = sold ? 'opacity:0.35; cursor:default;' : (!affordable ? 'opacity:0.55; cursor:default;' : '');
        const clickable = sold || !affordable ? '' : `data-action="${action}" ${dataAttr}`;
        const priceLabel = sold ? 'SOLD' : `${icon('gold')} ${price}`;
        return `
          <div class="shop-item" ${clickable} style="${style}">
            ${iconHtml ? `<div class="shop-item-icon">${iconHtml}</div>` : ''}
            <div style="font-weight: bold; text-align: center; word-break: break-word; margin-bottom: 5px;">${label}</div>
            ${desc ? `<div style="font-size:0.75em; color:var(--text-muted); margin-bottom:6px;">${desc}</div>` : ''}
            <div class="shop-item-price">${priceLabel}</div>
          </div>
        `;
      };

      const cardsHTML = cards.map(card => shopItem(card.name, card.price, card.sold, true, 'buyCard', `data-cardid="${card.id}"`, describeCard(CARDS_DB[card.id]), cardArtIcon(card.id, CARDS_DB[card.id].type))).join('');
      const relicsHTML = relics.map(relic => shopItem(relic.name, relic.price, relic.sold || hasRelic(STATE, relic.id), !hasRelic(STATE, relic.id), 'buyRelic', `data-relicid="${relic.id}"`, RELICS_DB[relic.id].description, relicIcon(relic.id, ''))).join('');

      const potionsFull = STATE.run.potions.every(p => p !== null);
      const potionsHTML = potions.map((potion, i) => shopItem(potion.name, potion.price, potion.sold, !potionsFull, 'buyPotion', `data-potionidx="${i}"`, POTIONS_DB[potion.id].desc, potionIcon(potion.id))).join('');

      const removalPrice = 75 + 25 * STATE.run.removalsThisRun;
      const canRemove = gold >= removalPrice && STATE.run.deck.length > 1;

      return `
        <div class="screen center-panel-screen">
          <div class="center-panel">

    function renderCardReward() {
      const choices = STATE.ui.cardRewardChoices || [];
      const reward = STATE.ui.combatReward || {};
      const potion = reward.potionId ? POTIONS_DB[reward.potionId] : null;
      const hasPotionRoom = STATE.run.potions.some(p => p === null);

      const choicesHTML = choices.map((card, idx) => `
        <button class="choice-button" data-action="selectCardRewardChoice" data-cardidx="${idx}">
          <span class="choice-label">${cardArtIcon(card.id, card.type)} ${card.name}</span>
          <span class="choice-desc">${typeIcon(card.type)} [${card.type}] Cost: ${card.cost} — ${describeCard(card)}</span>

      const replacePotionHTML = !hasPotionRoom && !reward.potionTaken ? STATE.run.potions.map((pid, slot) => {
        const pdef = pid ? POTIONS_DB[pid] : null;
        return pdef ? `<button class="inline-chip-button" data-action="replacePotion" data-slot="${slot}">Replace ${pdef.name}</button>` : '';
      }).join('') : '';
      const potionHTML = potion ? `

      const relicHTML = reward.relicId ? `<div class="reward-summary">Relic gained: <strong style="color:var(--color-relic);">${RELICS_DB[reward.relicId].name}</strong> — ${RELICS_DB[reward.relicId].description}</div>` : '';
      const maxHpHTML = reward.maxHpGained ? `<div class="reward-summary">Max HP gained: <strong style="color:var(--color-heal);">+${reward.maxHpGained}</strong></div>` : '';
      const eventRewardHTML = reward.eventRewardText ? `<div class="reward-summary">${reward.eventRewardText}</div>` : '';

      return `
        <div class="screen center-panel-screen">
          <div class="center-panel">
            <div class="panel-title">${icon('t-reward','icon-title')} Combat Reward ${icon('t-reward','icon-title')}</div>
            <div class="panel-content">
              <div class="reward-summary">Gold gained: <strong style="color:var(--color-gold);">${icon('gold')} ${reward.gold || 0}</strong>${reward.isElite ? ' · Elite defeated' : ''}</div>
              ${eventRewardHTML}
              ${relicHTML}
              ${maxHpHTML}
              ${potionHTML}
              <div class="panel-text">Choose a card to add to your deck:</div>
