    function renderCardPicker() {
      const picker = STATE.ui.picker;
      const isRemove = picker.purpose === 'remove';
      const title = isRemove
        ? `${icon('t-remove','icon-title')} Remove a Card ${icon('t-remove','icon-title')}`
        : `${icon('t-upgrade','icon-title')} Upgrade a Card ${icon('t-upgrade','icon-title')}`;
      const desc = isRemove ? 'Choose a card to permanently remove from your deck:' : 'Choose a card to permanently upgrade:';

      const cardsHTML = STATE.run.deck.map(card => {
        const cardDef = CARDS_DB[card.defId];
        const disabled = !isRemove && (card.upgraded || cardDef.type === CARD_TYPES.CURSE);
        const reason = cardDef.type === CARD_TYPES.CURSE && !isRemove ? ' — curses cannot be upgraded' : (card.upgraded && !isRemove ? ' — already upgraded' : '');
        return `
          <button class="choice-button ${disabled ? 'disabled-choice' : ''}" ${disabled ? '' : `data-action="pickCard" data-carduid="${card.uid}"`}>
            <span class="choice-label">${cardArtIcon(card.defId, cardDef.type)} ${cardDef.name}${card.upgraded ? '+' : ''}</span>
            <span class="choice-desc">${typeIcon(cardDef.type)} [${cardDef.type}] Cost ${cardDef.cost} — ${describeCard(card, !isRemove && !disabled ? true : undefined)}${reason}</span>
          </button>
        `;
      }).join('');

      return `
        <div class="screen center-panel-screen">
          <div class="center-panel">
            <div class="panel-title">${title}</div>
            <div class="panel-content">
              <div class="panel-text">${desc}</div>
              ${cardsHTML}
            </div>
            <button class="leave-button" data-action="cancelPicker">Cancel</button>
          </div>
        </div>
      `;
    }

    function renderDeckStats(cards) {
      if (!cards || !cards.length) return '';
      const counts = { ATTACK: 0, SKILL: 0, POWER: 0, CURSE: 0 };
      const costs = {};
      let totalCost = 0;
      let countedCost = 0;
      for (const card of cards) {
        const def = CARDS_DB[card.defId];
        if (!def) continue;
        counts[def.type] = (counts[def.type] || 0) + 1;
        if (def.type !== CARD_TYPES.CURSE) { totalCost += def.cost; countedCost++; }
        const key = def.cost >= 3 ? '3+' : String(def.cost);
        costs[key] = (costs[key] || 0) + 1;
      }
      const avg = countedCost ? (totalCost / countedCost).toFixed(2) : '0.00';
      const curve = ['0','1','2','3+'].map(k => `${k}: ${costs[k] || 0}`).join(' · ');
      return `<div class="deck-stats">Types: Attack ${counts.ATTACK || 0} · Skill ${counts.SKILL || 0} · Power ${counts.POWER || 0} · Curse ${counts.CURSE || 0}<br>Average non-curse cost: ${avg}<br>Cost curve: ${curve}</div>`;
    }

    function renderPileViewer() {
      const pile = STATE.ui.pileViewer;
      let title = 'Cards';
      let cards = [];
      if (pile === 'deck') {
        title = `Deck (${STATE.run.deck.length})`;
        cards = STATE.run.deck;
      } else if (STATE.combat && STATE.combat[pile]) {
        const labels = { drawPile: 'Draw Pile', discardPile: 'Discard Pile', exhaustPile: 'Exhaust Pile', activePowers: 'Active Powers', hand: 'Hand' };
        title = `${labels[pile] || pile} (${STATE.combat[pile].length})`;
        cards = STATE.combat[pile];
      }
      const cardsHTML = cards.length ? cards.map(card => {
        const cardDef = CARDS_DB[card.defId];
        if (!cardDef) return '';
        return `
          <button class="choice-button disabled-choice">
            <span class="choice-label">${cardArtIcon(card.defId, cardDef.type)} ${cardDef.name}${card.upgraded ? '+' : ''}</span>
            <span class="choice-desc">${typeIcon(cardDef.type)} [${cardDef.type}] Cost ${cardDef.cost} — ${describeCard(card)}</span>
          </button>
        `;
      }).join('') : '<div class="panel-text">No cards here.</div>';
      const statsHTML = pile === 'deck' ? renderDeckStats(cards) : '';
      return `
        <div class="screen center-panel-screen">
          <div class="center-panel">
            <div class="panel-title">${title}</div>
            ${statsHTML}
            <div class="panel-content">${cardsHTML}</div>
            <button class="leave-button" data-action="closeOverlay">Close</button>
          </div>
        </div>
      `;
    }

    function renderStatusBar() {
      const relicChips = STATE.run.relics.map(relic => {
        const relicDef = RELICS_DB[relic];
        const abbr = relicDef.short || relic.substring(0, 2).toUpperCase();
        return `<div class="relic-chip" title="${relicDef.name}: ${relicDef.description}">${relicIcon(relic, abbr)}</div>`;
      }).join('');
      const potionChips = STATE.run.potions.map((pid, slot) => {
        if (!pid) return `<div class="potion-slot empty" title="Empty potion slot">·</div>`;
        const pdef = POTIONS_DB[pid];
        const usable = STATE.combat || pdef.usableOutOfCombat;
        return `<div class="potion-slot" ${usable ? `data-action="usePotion" data-slot="${slot}"` : ''} title="${pdef.name}: ${pdef.desc || ''}${!STATE.combat && !pdef.usableOutOfCombat ? ' (combat only)' : ''}">${potionIcon(pid)}</div>`;
      }).join('');

      return `
        <div class="status-bar">
          <div class="status-left">
            <div class="status-item stat-hp">${icon('hp')} <span style="color: var(--color-heal);">${STATE.run.hp}/${STATE.run.maxHp}</span></div>
            <div class="status-item stat-gold">${icon('gold')} <span style="color: var(--color-gold);">${STATE.run.gold}</span></div>
            <div class="status-item stat-floor">${icon('floor')} <span>${STATE.run.floor}/${LAYOUT.FLOORS}</span></div>
            <div class="status-item">${STATE.run.characterName || 'Runner'} A${STATE.ascension || 0} · Act ${STATE.act || 1}</div>
            <button class="inline-chip-button" data-action="viewPile" data-pile="deck">${icon('deck')} Deck ${STATE.run.deck.length}</button>
          </div>
          <div class="status-right">
            <div class="potion-row">${potionChips}</div>
            ${relicChips}
          </div>
        </div>
      `;
    }

    function usePotionFromSlot(game, slot, targetUid) {
      const potionId = game.run.potions[slot];
      const potionDef = potionId ? POTIONS_DB[potionId] : null;
      if (!potionDef) return;
      let target = null;
      if (potionDef.target === 'ENEMY_SINGLE') {
        if (!game.combat) return;
        target = game.combat.enemies.find(e => e.uid === targetUid && e.alive) || game.combat.enemies.find(e => e.alive) || null;
        if (!target) return;
      } else if (!game.combat && !potionDef.usableOutOfCombat) {
        return;
      }
      potionDef.custom(game, target);
      AudioEngine.sfx('potion');
      if (game.combat) playEffect('player', 'potion');  // magical burst on the player when quaffing
      game.run.potions[slot] = null;
      if (game.combat) {
        game.combat.pendingPotionSlot = null;
        game.combat.pendingCardUid = null;
        checkCombatEnd(game);
      }
    }

    function cancelTargeting(game) {
      if (!game || !game.combat) return false;
      const hadTargeting = !!game.combat.pendingCardUid || game.combat.pendingPotionSlot !== null;
      game.combat.pendingCardUid = null;
      game.combat.pendingPotionSlot = null;
      return hadTargeting;
    }

    // ============ 11. HANDLERS ============

    document.getElementById('app').addEventListener('click', (e) => {
      AudioEngine.unlock();               // first gesture unlocks audio
      const btn = e.target.closest('[data-action]');
      if (!btn) return;

      AudioEngine.sfx('click');           // light UI tick on any actionable tap
      const action = btn.dataset.action;

      switch (action) {
        case 'startGame':
          startNewRun({ characterId: btn.dataset.characterid || 'cinder-knight', ascension: parseInt(btn.dataset.ascension || '0') || 0 });
          goTo(SCREENS.MAP);
          break;

        case 'continueRun':
          if (!loadGame()) render();
          break;

        case 'travelNode':
          travelToNode(STATE, btn.dataset.nodeid);
          break;

        case 'selectCard':
          playCard(STATE, btn.dataset.carduid);
          break;

        case 'targetEnemy':
          if (STATE.combat.pendingPotionSlot !== null) {
            usePotionFromSlot(STATE, STATE.combat.pendingPotionSlot, btn.dataset.enemyuid);
          } else if (STATE.combat.pendingCardUid) {
            const card = STATE.combat.hand.find(c => c.uid === STATE.combat.pendingCardUid);
            if (card) playCard(STATE, card.uid, btn.dataset.enemyuid);
          }
          break;

        case 'endTurn':
          endPlayerTurn(STATE);
          break;

        case 'cancelTargeting':
          cancelTargeting(STATE);
          render();
          break;

        case 'applyRestChoice':
          applyRest(STATE, btn.dataset.choice);
          break;

        case 'leaveRest':
          goTo(SCREENS.MAP);
          break;

        case 'leaveShop':
          goTo(SCREENS.MAP);
          break;

        case 'leaveTreasure':
          const treasureNode = STATE.run.map.nodes.find(n => n.id === STATE.run.currentNodeId);
          if (treasureNode && !treasureNode.rewardedTreasure) {
            const relic = getRandomRelic(STATE);
            if (relic && rand() < 0.8) {
              grantRelic(STATE, relic);
            } else {
              STATE.run.gold += 35 + Math.floor(rand() * 25);
            }
            treasureNode.rewardedTreasure = true;
          }
          goTo(SCREENS.MAP);
          break;

        case 'chooseEvent':
          const eventChoiceIdx = parseInt(btn.dataset.choiceidx);
          const activeEvent = STATE.ui.eventDef;
          const eventChoice = activeEvent.choices[eventChoiceIdx];
          if (!eventChoice.canApply || eventChoice.canApply(STATE)) {
            eventChoice.apply(STATE);
            if (STATE.screen === SCREENS.COMBAT) {
              STATE.ui.eventDef = null;
            } else {
              fireNonCombatRelicHook(STATE, 'onEventComplete', { event: activeEvent, choice: eventChoice });
              STATE.ui.eventDef = null;
              goTo(SCREENS.MAP);
            }
          }
          break;

        case 'selectCardRewardChoice':
          const cardIdx = parseInt(btn.dataset.cardidx);
          selectCardReward(STATE, STATE.ui.cardRewardChoices[cardIdx]);
          break;

        case 'skipCardReward':
          selectCardReward(STATE, null);
          break;

        case 'claimPotion': {
          const reward = STATE.ui.combatReward;
          const emptySlot = STATE.run.potions.findIndex(p => p === null);
          if (reward && reward.potionId && !reward.potionTaken && emptySlot !== -1) {
            STATE.run.potions[emptySlot] = reward.potionId;
            reward.potionTaken = true;
          }
          break;
        }

        case 'replacePotion': {
          const reward = STATE.ui.combatReward;
          const slot = parseInt(btn.dataset.slot);
          if (reward && reward.potionId && !reward.potionTaken && STATE.run.potions[slot]) {
            STATE.run.potions[slot] = reward.potionId;
            reward.potionTaken = true;
          }
          break;
        }

        case 'continueEndless':
          continueEndlessRun(STATE);
          break;

        case 'newRun': {
          const opts = STATE && STATE.run ? { characterId: STATE.run.characterId || 'cinder-knight', ascension: STATE.ascension || 0 } : {};
          startNewRun(opts);
          goTo(SCREENS.MAP);
          break;
        }

        case 'buyCard': {
          const node = STATE.run.map.nodes.find(n => n.id === STATE.run.currentNodeId);
          const inv = node.shopInventory.cards;
          const idx = inv.findIndex(c => c.id === btn.dataset.cardid && !c.sold);
          const item = inv[idx];
          if (item && !item.sold && STATE.run.gold >= item.price) {
            STATE.run.gold -= item.price;
            STATE.run.deck.push({ uid: uid(), defId: item.id, upgraded: false });
            item.sold = true;
            render();
          }
          break;
        }

        case 'buyRelic': {
          const node = STATE.run.map.nodes.find(n => n.id === STATE.run.currentNodeId);
          const inv = node.shopInventory.relics;
          const item = inv.find(r => r.id === btn.dataset.relicid && !r.sold);
          if (item && !item.sold && STATE.run.gold >= item.price && !hasRelic(STATE, item.id)) {
            STATE.run.gold -= item.price;
            grantRelic(STATE, item.id);
            item.sold = true;
            render();
          }
          break;
        }

        case 'buyPotion': {
          const node = STATE.run.map.nodes.find(n => n.id === STATE.run.currentNodeId);
          const inv = node.shopInventory.potions;
          const item = inv[parseInt(btn.dataset.potionidx)];
          const emptySlot = STATE.run.potions.findIndex(p => p === null);
          if (item && !item.sold && emptySlot !== -1 && STATE.run.gold >= item.price) {
            STATE.run.gold -= item.price;
            STATE.run.potions[emptySlot] = item.id;
            item.sold = true;
            render();
          }
          break;
        }

        case 'removeCard': {
          const removalPrice = 75 + 25 * STATE.run.removalsThisRun;
          if (STATE.run.gold >= removalPrice && STATE.run.deck.length > 1) {
            STATE.ui.picker = { purpose: 'remove' };
            render();
          }
          break;
        }

        case 'pickCard': {
          const cardUid = btn.dataset.carduid;
          const purpose = STATE.ui.picker.purpose;
          const deckIdx = STATE.run.deck.findIndex(c => c.uid === cardUid);
          if (deckIdx !== -1) {
            if (purpose === 'remove') {
              STATE.run.gold -= (75 + 25 * STATE.run.removalsThisRun);
              STATE.run.removalsThisRun++;
              STATE.run.deck.splice(deckIdx, 1);
              STATE.ui.picker = null;
              goTo(SCREENS.SHOP);
            } else if (purpose === 'refine') {
              if (!isCurseCardInstance(STATE.run.deck[deckIdx])) STATE.run.deck[deckIdx].upgraded = true;
              STATE.ui.picker = null;
              goTo(SCREENS.MAP);
            }
          }
          break;
        }

        case 'cancelPicker': {
          const purpose = STATE.ui.picker ? STATE.ui.picker.purpose : null;
          STATE.ui.picker = null;
          goTo(purpose === 'remove' ? SCREENS.SHOP : SCREENS.REST);
          break;
        }

        case 'usePotion': {
          const slot = parseInt(btn.dataset.slot);
          const potionId = STATE.run.potions[slot];
          const potionDef = potionId ? POTIONS_DB[potionId] : null;
          if (!potionDef) break;
          if (STATE.combat) {
            if (STATE.combat.pendingPotionSlot === slot) {
              STATE.combat.pendingPotionSlot = null;
            } else {
              const aliveEnemies = STATE.combat.enemies.filter(e => e.alive);
              if (potionDef.target === 'ENEMY_SINGLE' && aliveEnemies.length > 1) {
                STATE.combat.pendingPotionSlot = slot;
                STATE.combat.pendingCardUid = null;
              } else {
                usePotionFromSlot(STATE, slot, aliveEnemies[0] ? aliveEnemies[0].uid : null);
              }
            }
          } else {
            usePotionFromSlot(STATE, slot, null);
          }
          break;
        }

        case 'viewPile':
          STATE.ui.pileViewer = btn.dataset.pile || 'deck';
          break;

        case 'closeOverlay':
          STATE.ui.pileViewer = null;
          STATE.ui.picker = null;
          break;
      }

      // Safety-net re-render: combat actions (playCard/endTurn/targetEnemy)
      // mutate state without navigating, so always redraw the current screen.
      render();
      saveGame(STATE);
    });

    document.addEventListener('keydown', (e) => {
      if (!STATE) return;
      if (e.key === 'Escape') {
        if (STATE.ui && (STATE.ui.pileViewer || STATE.ui.picker)) {
          STATE.ui.pileViewer = null;
          STATE.ui.picker = null;
          render();
          return;
        }
        if (cancelTargeting(STATE)) { render(); return; }
      }
      if (STATE.ui && (STATE.ui.pileViewer || STATE.ui.picker)) return;
      if (STATE.screen !== SCREENS.COMBAT || !STATE.combat || STATE.combat.phase !== 'PLAYER') return;
      if (e.key.toLowerCase() === 'e') {
        endPlayerTurn(STATE);
        render();
        saveGame(STATE);
        return;
      }
      const n = parseInt(e.key, 10);
      if (!Number.isNaN(n) && n >= 1 && n <= 9) {
        if (STATE.combat.pendingCardUid || STATE.combat.pendingPotionSlot !== null) {
          const enemies = STATE.combat.enemies.filter(x => x.alive);
          const enemy = enemies[n - 1];
          if (enemy) {
            if (STATE.combat.pendingPotionSlot !== null) usePotionFromSlot(STATE, STATE.combat.pendingPotionSlot, enemy.uid);
            else playCard(STATE, STATE.combat.pendingCardUid, enemy.uid);
          }
        } else {
          const card = STATE.combat.hand[n - 1];
          if (card) playCard(STATE, card.uid);
        }
        render();
        saveGame(STATE);
      }
    });

    function validateContent() {
      const warnings = [];
      const knownTargets = ['SELF', 'ENEMY_SINGLE', 'ENEMY_ALL'];
      for (const [id, card] of Object.entries(CARDS_DB)) {
        if (id !== card.id) warnings.push(`Card key/id mismatch: ${id}`);
        if (!card.name || card.cost == null || !card.type || !card.rarity) warnings.push(`Card missing fields: ${id}`);
        if (card.target && !knownTargets.includes(card.target)) warnings.push(`Unknown card target on ${id}: ${card.target}`);
        for (const eff of (card.effects || [])) {
          if (!['DAMAGE','BLOCK','DRAW','ENERGY','HEAL','APPLY_STATUS','APPLY_SELF_STATUS'].includes(eff.type)) warnings.push(`Unsupported effect ${eff.type} on ${id}`);
          if ((eff.type === 'APPLY_STATUS' || eff.type === 'APPLY_SELF_STATUS') && !STATUS_INFO[eff.status]) warnings.push(`Unknown status ${eff.status} on ${id}`);
        }
      }
      for (const [id, enemy] of Object.entries(ENEMIES_DB)) {
        if (id !== enemy.id) warnings.push(`Enemy key/id mismatch: ${id}`);
        if (!enemy.name || !enemy.maxHp || (!enemy.pattern && !enemy.getIntent)) warnings.push(`Enemy missing fields: ${id}`);
        for (const token of (enemy.pattern || [])) {
          const parsed = parseIntentToken(token);
          if (parsed.type === 'UNKNOWN') warnings.push(`Unknown enemy pattern token on ${id}: ${token}`);
        }
      }
      for (const [id, relic] of Object.entries(RELICS_DB)) {
        if (id !== relic.id) warnings.push(`Relic key/id mismatch: ${id}`);
        if (!relic.name || !relic.description || !relic.short) warnings.push(`Relic missing fields: ${id}`);
      }
      for (const [id, potion] of Object.entries(POTIONS_DB)) {
        if (id !== potion.id) warnings.push(`Potion key/id mismatch: ${id}`);
        if (!potion.name || !knownTargets.includes(potion.target)) warnings.push(`Potion missing/unknown target: ${id}`);
      }
      const encounterTables = [...Object.values(ENCOUNTER_TABLES).flat(), ...Object.values(ELITE_TABLES).flat()];
      for (const encounter of encounterTables) for (const enemyId of encounter) if (!ENEMIES_DB[enemyId]) warnings.push(`Encounter references missing enemy: ${enemyId}`);
      for (const [id, ch] of Object.entries(CHARACTERS_DB)) {
        if (id !== ch.id) warnings.push(`Character key/id mismatch: ${id}`);
        for (const cardId of ch.deck) if (!CARDS_DB[cardId]) warnings.push(`Character ${id} references missing card: ${cardId}`);
        for (const relicId of ch.relics) if (!RELICS_DB[relicId]) warnings.push(`Character ${id} references missing relic: ${relicId}`);
      }
      for (const event of EVENTS_DB) {
        if (!event.id || !event.choices || !event.choices.length) warnings.push(`Event missing fields: ${event.id || 'unknown'}`);
      }
      if (warnings.length) console.warn('Cinder Vault content warnings:', warnings);
      return warnings;
    }

    function buildBalanceReport() {
      return Object.values(CARDS_DB).map(card => ({
        id: card.id,
        name: card.name,
        type: card.type,
        rarity: card.rarity,
        cost: card.cost,
        text: describeCard(card)
      }));
    }

    function autoplay(seed, floors, opts) {
      opts = opts || {};
      startNewRun({ seed: seed || 1, characterId: opts.characterId || 'cinder-knight', ascension: opts.ascension || 0 });
      goTo(SCREENS.MAP);
      let steps = 0;
      const maxSteps = opts.maxSteps || 5000;
      while (![SCREENS.VICTORY, SCREENS.GAMEOVER].includes(STATE.screen) && steps++ < maxSteps && STATE.run.floor <= (floors || LAYOUT.FLOORS)) {
        if (STATE.screen === SCREENS.MAP) {
          const next = availableNodeIds(STATE)[0];
          if (!next) break;
          travelToNode(STATE, next);
        } else if (STATE.screen === SCREENS.COMBAT) {
          let guard = 0;
          while (STATE.screen === SCREENS.COMBAT && guard++ < 120) {
            const playable = STATE.combat.hand.filter(c => {
              const def = CARDS_DB[c.defId];
              return def && !def.unplayable && def.cost <= STATE.combat.energy;
            });
            if (!playable.length) { endPlayerTurn(STATE); continue; }
            const card = pickOne(playable);
            const def = CARDS_DB[card.defId];
            const target = STATE.combat.enemies.find(e => e.alive);
            playCard(STATE, card.uid, def.target === 'ENEMY_SINGLE' && target ? target.uid : null);
          }
          if (guard >= 120 && STATE.screen === SCREENS.COMBAT) throw new Error('Autoplay combat turn cap hit');
        } else if (STATE.screen === SCREENS.CARD_REWARD) {
          selectCardReward(STATE, null);
        } else if (STATE.screen === SCREENS.REST) {
          applyRest(STATE, STATE.run.hp < STATE.run.maxHp * 0.65 ? 'rest' : 'refine');
          if (STATE.ui.picker) { STATE.ui.picker = null; goTo(SCREENS.MAP); }
        } else if (STATE.screen === SCREENS.SHOP) {
          goTo(SCREENS.MAP);
        } else if (STATE.screen === SCREENS.EVENT) {
          const event = STATE.ui.eventDef;
          const choice = event.choices.find(c => !c.canApply || c.canApply(STATE)) || event.choices[0];
          choice.apply(STATE);
          STATE.ui.eventDef = null;
          goTo(SCREENS.MAP);
        } else if (STATE.screen === SCREENS.TREASURE) {
          const treasureNode = STATE.run.map.nodes.find(n => n.id === STATE.run.currentNodeId);
          if (treasureNode && !treasureNode.rewardedTreasure) {
            const relic = getRandomRelic(STATE);
            if (relic) grantRelic(STATE, relic);
            treasureNode.rewardedTreasure = true;
          }
          goTo(SCREENS.MAP);
        } else {
          break;
        }
      }
      return { screen: STATE.screen, floor: STATE.run.floor, hp: STATE.run.hp, gold: STATE.run.gold, steps };
    }

    // Scale the fixed 1024x600 design stage to fill the viewport, preserving
    // aspect ratio (letterboxed). Recomputed on resize / orientation change.
    function fitStage() {
      const stage = document.getElementById('stage');
      if (!stage) return;
      const s = Math.min(window.innerWidth / 1024, window.innerHeight / 600);
      stage.style.setProperty('--stage-scale', s);
    }

    function initApp() {
      STATE = { screen: SCREENS.MENU, run: null, combat: null, ui: {}, seed: null, ascension: 0 };
      validateContent();
      window.CINDER_DEBUG = {
        getState: () => STATE,
        validateContent,
        balanceReport: buildBalanceReport,
        saveGame: () => saveGame(STATE),
        loadGame,
        clearSave,
        autoplay,
        continueEndless: () => continueEndlessRun(STATE),
        startSeed: (seed, characterId, ascension) => { startNewRun({ seed, characterId: characterId || 'cinder-knight', ascension: ascension || 0 }); goTo(SCREENS.MAP); }
      };
      window.addEventListener('resize', fitStage);
      window.addEventListener('orientationchange', () => setTimeout(fitStage, 100));
      fitStage();

      // Persistent sound toggle + first-gesture audio unlock.
      const muteBtn = document.getElementById('mute-btn');
      if (muteBtn) {
        if (AudioEngine.isMuted()) muteBtn.classList.add('muted');
        muteBtn.addEventListener('click', () => {
          AudioEngine.unlock();
          const nowMuted = AudioEngine.toggleMute();
          muteBtn.classList.toggle('muted', nowMuted);
        });
      }
      window.addEventListener('keydown', () => AudioEngine.unlock(), { once: true });
      window.addEventListener('pointerdown', () => AudioEngine.unlock(), { once: true });

      render();
    }

    // ============ 12. INIT ============

    initApp();
  </script>
</body>
